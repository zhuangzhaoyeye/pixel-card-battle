<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>赛博卡牌：霓虹对决</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-cyan: #00f3ff;
    --neon-pink: #ff00ff;
    --neon-purple: #9d00ff;
    --neon-yellow: #ffff00;
    --neon-green: #00ff88;
    --neon-red: #ff0040;
    --dark-bg: #0a0a0f;
    --panel-bg: rgba(10, 15, 30, 0.9);
    --grid-color: rgba(0, 243, 255, 0.1);
  }

  body {
    font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
    background: var(--dark-bg);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* 赛博朋克背景网格 */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
      linear-gradient(var(--grid-color) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
    100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
  }

  /* 霓虹发光效果 */
  .neon-text {
    text-shadow: 
      0 0 10px var(--neon-cyan),
      0 0 20px var(--neon-cyan),
      0 0 40px var(--neon-cyan);
  }

  .neon-border {
    border: 2px solid var(--neon-cyan);
    box-shadow: 
      0 0 10px var(--neon-cyan),
      inset 0 0 10px rgba(0, 243, 255, 0.2);
  }

  .neon-pink { --neon-color: var(--neon-pink); }
  .neon-purple { --neon-color: var(--neon-purple); }
  .neon-yellow { --neon-color: var(--neon-yellow); }
  .neon-green { --neon-color: var(--neon-green); }
  .neon-red { --neon-color: var(--neon-red); }

  /* 屏幕容器 */
  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .screen.active { display: flex; }

  /* 故障艺术效果 */
  .glitch {
    position: relative;
    animation: glitch 2s infinite;
  }

  @keyframes glitch {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
  }

  /* ===== 开始界面 ===== */
  #start-screen {
    justify-content: center;
    text-align: center;
  }

  .cyber-title {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 8px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleGlow 3s ease-in-out infinite;
  }

  @keyframes titleGlow {
    0%, 100% { filter: brightness(1) drop-shadow(0 0 20px var(--neon-cyan)); }
    50% { filter: brightness(1.3) drop-shadow(0 0 40px var(--neon-pink)); }
  }

  .cyber-subtitle {
    font-size: 14px;
    letter-spacing: 12px;
    color: var(--neon-cyan);
    margin-bottom: 60px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* 赛博按钮 */
  .cyber-btn {
    position: relative;
    padding: 20px 60px;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--neon-cyan);
    background: transparent;
    border: 2px solid var(--neon-cyan);
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .cyber-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    transition: left 0.5s;
  }

  .cyber-btn:hover::before {
    left: 100%;
  }

  .cyber-btn:hover {
    background: rgba(0, 243, 255, 0.1);
    box-shadow: 
      0 0 20px var(--neon-cyan),
      inset 0 0 20px rgba(0, 243, 255, 0.2);
  }

  /* ===== 选卡界面 ===== */
  #select-screen h2 {
    font-size: 28px;
    margin: 30px 0;
    letter-spacing: 4px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 25px;
    max-width: 900px;
    width: 100%;
    margin: 20px 0;
  }

  /* 赛博卡牌 */
  .cyber-card {
    position: relative;
    background: var(--panel-bg);
    border: 1px solid rgba(0, 243, 255, 0.3);
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s;
    overflow: hidden;
  }

  .cyber-card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .cyber-card:hover::before {
    opacity: 1;
  }

  .cyber-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0, 243, 255, 0.3);
  }

  .cyber-card.selected {
    border-color: var(--neon-yellow);
    box-shadow: 
      0 0 30px var(--neon-yellow),
      inset 0 0 30px rgba(255, 255, 0, 0.1);
  }

  .cyber-card.selected::before {
    background: linear-gradient(45deg, var(--neon-yellow), var(--neon-cyan));
    opacity: 0.5;
  }

  /* 角色立绘区域 */
  .character-art {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(255, 0, 255, 0.1));
    border: 1px solid rgba(0, 243, 255, 0.3);
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .character-art::before {
    content: '';
    position: absolute;
    width: 150%; height: 150%;
    background: conic-gradient(from 0deg, transparent, var(--neon-cyan), transparent 30%);
    animation: rotate 4s linear infinite;
  }

  @keyframes rotate {
    100% { transform: rotate(360deg); }
  }

  .character-icon {
    font-size: 80px;
    z-index: 1;
    filter: drop-shadow(0 0 20px var(--neon-cyan));
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 10px;
    color: var(--neon-cyan);
  }

  .card-stats {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.7);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .stat-label {
    color: var(--neon-purple);
  }

  .element-tag {
    display: inline-block;
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 10px;
    border: 1px solid;
  }

  .element-fire { color: var(--neon-red); border-color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
  .element-ice { color: var(--neon-cyan); border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
  .element-wind { color: var(--neon-green); border-color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
  .element-dark { color: var(--neon-purple); border-color: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }
  .element-holy { color: var(--neon-yellow); border-color: var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow); }

  /* ===== 战斗界面 ===== */
  #battle-screen {
    padding: 10px;
  }

  .battle-header {
    text-align: center;
    padding: 15px;
    margin-bottom: 20px;
    border: 1px solid var(--neon-cyan);
    background: rgba(0, 243, 255, 0.05);
  }

  .round-indicator {
    font-size: 20px;
    letter-spacing: 8px;
    color: var(--neon-cyan);
  }

  /* 战斗场地 */
  .battle-arena {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .fighter-container {
    flex: 1;
    min-width: 280px;
    max-width: 400px;
  }

  .fighter-panel {
    background: var(--panel-bg);
    border: 1px solid rgba(0, 243, 255, 0.3);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .fighter-panel.player {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
  }

  .fighter-panel.enemy {
    border-color: var(--neon-red);
    box-shadow: 0 0 20px rgba(255, 0, 64, 0.2);
  }

  /* 角色战斗立绘 */
  .fighter-portrait {
    width: 100%;
    height: 200px;
    background: linear-gradient(180deg, rgba(0, 243, 255, 0.1), transparent);
    border: 1px solid rgba(0, 243, 255, 0.3);
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .fighter-portrait::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to top, rgba(0, 243, 255, 0.2), transparent);
  }

  .fighter-sprite {
    font-size: 100px;
    z-index: 1;
    filter: drop-shadow(0 0 30px var(--neon-cyan));
    transition: all 0.3s;
  }

  .fighter-panel.enemy .fighter-sprite {
    filter: drop-shadow(0 0 30px var(--neon-red));
  }

  /* 攻击动画 */
  .fighter-sprite.attacking {
    animation: cyberAttack 0.6s ease-out;
  }

  @keyframes cyberAttack {
    0% { transform: translateX(0) scale(1); }
    30% { transform: translateX(50px) scale(1.2); filter: brightness(2) drop-shadow(0 0 50px var(--neon-yellow)); }
    50% { transform: translateX(80px) scale(1.3); }
    100% { transform: translateX(0) scale(1); }
  }

  .fighter-sprite.hurt {
    animation: cyberHurt 0.5s ease-out;
  }

  @keyframes cyberHurt {
    0%, 100% { filter: brightness(1); }
    25% { filter: brightness(3) hue-rotate(90deg) drop-shadow(0 0 50px var(--neon-red)); transform: translateX(-10px); }
    50% { filter: brightness(0.5); transform: translateX(10px); }
    75% { filter: brightness(2) drop-shadow(0 0 30px var(--neon-red)); }
  }

  .fighter-info {
    text-align: center;
    margin-bottom: 15px;
  }

  .fighter-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 5px;
  }

  .fighter-panel.player .fighter-name { color: var(--neon-cyan); }
  .fighter-panel.enemy .fighter-name { color: var(--neon-red); }

  /* 赛博血条 */
  .cyber-bar {
    margin: 10px 0;
  }

  .bar-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }

  .bar-track {
    height: 12px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    transition: width 0.5s ease;
    position: relative;
  }

  .hp-bar { background: linear-gradient(90deg, var(--neon-red), var(--neon-pink)); }
  .mp-bar { background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); }

  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: barShine 2s infinite;
  }

  @keyframes barShine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* VS 标志 */
  .vs-container {
    font-size: 48px;
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 
      0 0 20px var(--neon-yellow),
      0 0 40px var(--neon-yellow);
    animation: vsPulse 1.5s ease-in-out infinite;
  }

  @keyframes vsPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.8; }
  }

  /* 战斗日志 */
  .battle-log {
    background: var(--panel-bg);
    border: 1px solid rgba(0, 243, 255, 0.2);
    height: 120px;
    overflow-y: auto;
    padding: 15px;
    font-size: 12px;
    margin-bottom: 20px;
  }

  .battle-log::-webkit-scrollbar {
    width: 6px;
  }

  .battle-log::-webkit-scrollbar-thumb {
    background: var(--neon-cyan);
  }

  .log-entry {
    margin: 8px 0;
    padding: 8px;
    border-left: 3px solid;
    animation: logSlide 0.3s ease-out;
  }

  @keyframes logSlide {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .log-player { border-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.05); }
  .log-enemy { border-color: var(--neon-red); background: rgba(255, 0, 64, 0.05); }
  .log-system { border-color: var(--neon-yellow); background: rgba(255, 255, 0, 0.05); }
  .log-critical { border-color: var(--neon-pink); background: rgba(255, 0, 255, 0.1); font-weight: bold; }

  /* 技能面板 */
  .skill-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 20px;
  }

  .skill-btn {
    position: relative;
    padding: 15px;
    background: rgba(0, 243, 255, 0.05);
    border: 1px solid rgba(0, 243, 255, 0.3);
    color: #fff;
    cursor: pointer;
    text-align: left;
    transition: all 0.3s;
    overflow: hidden;
  }

  .skill-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.2), transparent);
    transition: left 0.5s;
  }

  .skill-btn:hover::before {
    left: 100%;
  }

  .skill-btn:hover:not(:disabled) {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
    transform: translateX(5px);
  }

  .skill-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .skill-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--neon-cyan);
    margin-bottom: 5px;
    letter-spacing: 2px;
  }

  .skill-desc {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.6);
  }

  .skill-cost {
    position: absolute;
    bottom: 10px; right: 10px;
    font-size: 11px;
    color: var(--neon-purple);
  }

  /* 伤害数字特效 */
  .damage-popup {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 900;
    pointer-events: none;
    z-index: 1000;
    animation: damageFloat 1s ease-out forwards;
    text-shadow: 0 0 20px currentColor;
  }

  @keyframes damageFloat {
    0% { 
      opacity: 1; 
      transform: translateY(0) scale(0.5); 
    }
    50% { 
      opacity: 1; 
      transform: translateY(-50px) scale(1.2); 
    }
    100% { 
      opacity: 0; 
      transform: translateY(-100px) scale(1); 
    }
  }

  .damage-normal { color: var(--neon-cyan); }
  .damage-crit { 
    color: var(--neon-yellow); 
    font-size: 48px;
    text-shadow: 
      0 0 20px var(--neon-yellow),
      0 0 40px var(--neon-red);
  }
  .damage-heal { color: var(--neon-green); }

  /* 屏幕闪光特效 */
  .screen-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 999;
    animation: flash 0.3s ease-out;
  }

  .flash-cyan { background: rgba(0, 243, 255, 0.3); }
  .flash-red { background: rgba(255, 0, 64, 0.3); }
  .flash-yellow { background: rgba(255, 255, 0, 0.3); }

  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* 粒子特效 */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 998;
    animation: particleFloat 1s ease-out forwards;
  }

  @keyframes particleFloat {
    0% { 
      opacity: 1; 
      transform: translate(0, 0) scale(1); 
    }
    100% { 
      opacity: 0; 
      transform: translate(var(--tx), var(--ty)) scale(0); 
    }
  }

  /* 结果界面 */
  #result-screen {
    justify-content: center;
    text-align: center;
  }

  .result-title {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: 8px;
    margin-bottom: 30px;
    animation: resultGlow 2s ease-in-out infinite;
  }

  .result-win {
    color: var(--neon-green);
    text-shadow: 
      0 0 20px var(--neon-green),
      0 0 40px var(--neon-green);
  }

  .result-lose {
    color: var(--neon-red);
    text-shadow: 
      0 0 20px var(--neon-red),
      0 0 40px var(--neon-red);
  }

  @keyframes resultGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.5); }
  }

  .result-stats {
    font-size: 14px;
    line-height: 2.5;
    margin: 40px 0;
    padding: 30px;
    background: var(--panel-bg);
    border: 1px solid rgba(0, 243, 255, 0.3);
  }

  /* 扫描线效果 */
  .scanlines::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.1) 2px,
      rgba(0, 0, 0, 0.1) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .cyber-title { font-size: 32px; letter-spacing: 4px; }
    .card-grid { grid-template-columns: repeat(2, 1fr); }
    .battle-arena { flex-direction: column; }
    .vs-container { font-size: 36px; }
    .skill-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body class="scanlines">

<!-- 开始界面 -->
<div id="start-screen" class="screen active">
  <h1 class="cyber-title glitch">赛博卡牌</h1>
  <p class="cyber-subtitle">NEON BATTLE PROTOCOL</p>
  <button class="cyber-btn" onclick="showScreen('select')">初始化系统</button>
</div>

<!-- 选卡界面 -->
<div id="select-screen" class="screen">
  <h2 class="neon-text">选择战斗单位</h2>
  <p style="font-size: 12px; color: var(--neon-purple); margin-bottom: 20px;">
    已选择 <span id="select-count" style="color: var(--neon-cyan); font-size: 18px;">0</span> / 3 个单位
  </p>
  <div class="card-grid" id="card-grid"></div>
  <div style="display: flex; gap: 20px; margin-top: 30px;">
    <button class="cyber-btn" onclick="showScreen('start')" style="padding: 15px 40px; font-size: 14px;">返回</button>
    <button class="cyber-btn" id="btn-confirm" onclick="startBattle()" disabled style="padding: 15px 40px; font-size: 14px;">
      启动战斗序列
    </button>
  </div>
</div>

<!-- 战斗界面 -->
<div id="battle-screen" class="screen">
  <div class="battle-header">
    <div class="round-indicator">ROUND <span id="round-num">1</span></div>
  </div>
  
  <div class="battle-arena">
    <div class="fighter-container">
      <div class="fighter-panel player" id="player-panel"></div>
    </div>
    <div class="vs-container">VS</div>
    <div class="fighter-container">
      <div class="fighter-panel enemy" id="enemy-panel"></div>
    </div>
  </div>
  
  <div class="battle-log" id="battle-log"></div>
  <div class="skill-grid" id="skill-panel"></div>
</div>

<!-- 结果界面 -->
<div id="result-screen" class="screen">
  <div class="result-title" id="result-title"></div>
  <div class="result-stats" id="result-stats"></div>
  <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
    <button class="cyber-btn" onclick="showScreen('start')">主菜单</button>
    <button class="cyber-btn" onclick="showScreen('select')">重新选择</button>
    <button class="cyber-btn" onclick="startBattle()">再次战斗</button>
  </div>
</div>

<script>
// 赛博朋克风格角色数据

// 游戏状态
let selectedCards = [];
let player = null;
let enemy = null;

  round: 1,
  playerBuffs: [], enemyBuffs: [],
  playerDebuffs: [], enemyDebuffs: [],
  playerDot: [], enemyDot: [],

  totalDamageDealt: 0, totalDamageReceived: 0,
  totalHealed: 0, criticalHits: 0, turnsPlayed: 0

// 界面切换
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  if (name === 'select') renderCardGrid();
}

// 渲染卡牌
function renderCardGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  selectedCards = [];
  updateSelectCount();

  CYBER_CARDS.forEach(card => {
    const div = document.createElement('div');
    div.className = 'cyber-card';
    div.dataset.id = card.id;
    div.innerHTML = `
      <div class="character-art">
        <div class="character-icon" style="filter: drop-shadow(0 0 20px ${card.color});">${card.icon}</div>
      </div>
      <div class="card-name" style="color: ${card.color};">${card.name}</div>
      <div class="card-stats">
        <div class="stat-item"><span class="stat-label">HP</span> ${card.baseHp}</div>
        <div class="stat-item"><span class="stat-label">ATK</span> ${card.baseAtk}</div>
        <div class="stat-item"><span class="stat-label">DEF</span> ${card.baseDef}</div>
        <div class="stat-item"><span class="stat-label">SPD</span> ${card.baseSpd}</div>
      </div>
      <span class="element-tag element-${card.element}">${card.elementName}</span>
    `;
    div.onclick = () => toggleCard(card.id, div);
    grid.appendChild(div);
  });
}

function toggleCard(id, el) {
  const idx = selectedCards.indexOf(id);
  if (idx >= 0) {
    selectedCards.splice(idx, 1);
    el.classList.remove('selected');
  } else if (selectedCards.length < 3) {
    selectedCards.push(id);
    el.classList.add('selected');
  }
  updateSelectCount();
}

function updateSelectCount() {
  document.getElementById('select-count').textContent = selectedCards.length;
  document.getElementById('btn-confirm').disabled = selectedCards.length !== 3;
}

// 开始战斗
function startBattle() {
  if (selectedCards.length !== 3) return;

  const playerData = CYBER_CARDS.find(c => c.id === selectedCards[Math.floor(Math.random() * selectedCards.length)]);
  const enemyData = CYBER_ENEMIES[Math.floor(Math.random() * CYBER_ENEMIES.length)];

  player = { ...playerData, hp: playerData.baseHp, maxHp: playerData.baseHp, mp: playerData.baseMp, maxMp: playerData.baseMp, atk: playerData.baseAtk, def: playerData.baseDef, spd: playerData.baseSpd, isPlayer: true };
  enemy = { ...enemyData, hp: enemyData.hp, maxHp: enemyData.hp, mp: enemyData.mp, maxMp: enemyData.mp, isPlayer: false };

  battleState = {
    round: 1, playerBuffs: [], enemyBuffs: [],
    playerDebuffs: [], enemyDebuffs: [],
    playerDot: [], enemyDot: [],
    isPlayerTurn: player.spd >= enemy.spd,
    isAnimating: false,
    totalDamageDealt: 0, totalDamageReceived: 0,
    totalHealed: 0, criticalHits: 0, turnsPlayed: 0
  };

  showScreen('battle');
  renderBattle();
  addLog('战斗系统初始化完成', 'system');
  addLog(`${player.name} VS ${enemy.name}`, 'system');

  if (!battleState.isPlayerTurn) {
    setTimeout(() => enemyTurn(), 1000);
  }
}

function renderSkills() {
  const panel = document.getElementById('skill-panel');
  panel.innerHTML = '';

  if (!battleState.isPlayerTurn || battleState.isAnimating) {
    panel.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--neon-purple);padding:20px;">敌方回合...</div>';
    return;
  }

  player.skills.forEach((skill, i) => {
    const canUse = player.mp >= skill.cost;
    const btn = document.createElement('button');
    btn.className = 'skill-btn';
    btn.disabled = !canUse;
    btn.innerHTML = `
      <div class="skill-name">${skill.name}</div>
      <div class="skill-desc">${skill.desc}</div>
      <span class="skill-cost">${skill.cost > 0 ? 'MP ' + skill.cost : 'FREE'}</span>
    `;
    btn.onclick = () => playerUseSkill(i);
    panel.appendChild(btn);
  });
}

// 战斗日志
function addLog(text, type = 'system') {
  const log = document.getElementById('battle-log');
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

// 伤害计算
function calcDamage(attacker, defender, skill) {
  const basePower = skill.power || 1.0;
  let atk = attacker.atk;
  let def = defender.def;

  const advantage = { fire: 'wind', wind: 'ice', ice: 'fire', holy: 'dark', dark: 'holy' };
  let elementMultiplier = 1.0;
  if (skill.element && advantage[skill.element] === defender.element) {
    elementMultiplier = 1.3;
  } else if (skill.element && advantage[defender.element] === skill.element) {
    elementMultiplier = 0.7;
  }

  let isCrit = Math.random() < (skill.critRate || 0.1);
  let critMultiplier = isCrit ? 1.8 : 1.0;
  let variance = 0.9 + Math.random() * 0.2;

  let damage = Math.floor((atk * basePower - def * 0.5) * elementMultiplier * critMultiplier * variance);
  damage = Math.max(1, damage);

  return { damage, isCrit, elementMultiplier };
}

// 显示伤害
function showDamage(target, value, isCrit, isHeal) {
  const popup = document.createElement('div');
  popup.className = `damage-popup ${isHeal ? 'damage-heal' : isCrit ? 'damage-crit' : 'damage-normal'}`;
  popup.textContent = isHeal ? `+${value}` : `-${value}`;
  popup.style.left = '50%';
  popup.style.top = target === 'player' ? '60%' : '30%';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);

  // 粒子特效
  if (!isHeal) {
    createParticles(popup.style.left, popup.style.top, isCrit ? 20 : 10);
  }
}

// 创建粒子
function createParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${x};
      top: ${y};
      width: ${Math.random() * 6 + 2}px;
      height: ${Math.random() * 6 + 2}px;
      background: hsl(${Math.random() * 60 + 180}, 100%, 50%);
      --tx: ${(Math.random() - 0.5) * 200}px;
      --ty: ${(Math.random() - 0.5) * 200}px;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// 屏幕闪光
function flashScreen(color) {
  const flash = document.createElement('div');
  flash.className = `screen-flash flash-${color}`;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 300);
}

// 玩家行动
function playerUseSkill(skillIndex) {
  if (battleState.isAnimating || !battleState.isPlayerTurn) return;
  battleState.isAnimating = true;
  battleState.turnsPlayed++;

  const skill = player.skills[skillIndex];
  if (player.mp < skill.cost) return;

  player.mp -= skill.cost;

  // 攻击动画
  const sprite = document.getElementById('player-sprite');
  if (sprite) {
    sprite.classList.add('attacking');
    setTimeout(() => sprite.classList.remove('attacking'), 600);
  }

  setTimeout(() => {
    executeSkill(player, enemy, skill, 'player');
    renderBattle();

    if (checkBattleEnd()) return;

    processTurnEnd('player');

    setTimeout(() => {
      battleState.isPlayerTurn = false;
      renderBattle();
      setTimeout(() => enemyTurn(), 800);
    }, 600);
  }, 400);
}

// 敌人行动
function enemyTurn() {
  if (battleState.isAnimating) return;
  battleState.isAnimating = true;
  battleState.turnsPlayed++;

  const availableSkills = enemy.skills.filter(s => enemy.mp >= s.cost);
  let skill;
  if (enemy.hp < enemy.maxHp * 0.3 && availableSkills.find(s => s.type === 'restore')) {
    skill = availableSkills.find(s => s.type === 'restore');
  } else {
    const attackSkills = availableSkills.filter(s => s.type === 'attack');
    skill = attackSkills.length > 0 ? attackSkills[Math.floor(Math.random() * attackSkills.length)] : enemy.skills[enemy.skills.length - 1];
  }

  enemy.mp -= skill.cost;

  const sprite = document.getElementById('enemy-sprite');
  if (sprite) {
    sprite.classList.add('attacking');
    setTimeout(() => sprite.classList.remove('attacking'), 600);
  }

  setTimeout(() => {
    executeSkill(enemy, player, skill, 'enemy');
    renderBattle();

    if (checkBattleEnd()) return;

    processTurnEnd('enemy');

    setTimeout(() => {
      battleState.round++;
      battleState.isPlayerTurn = true;
      battleState.isAnimating = false;

      player.mp = Math.min(player.maxMp, player.mp + 3);
      enemy.mp = Math.min(enemy.maxMp, enemy.mp + 3);

      renderBattle();
      addLog(`--- 第 ${battleState.round} 回合 ---`, 'system');
    }, 600);
  }, 400);
}

// 执行技能
function executeSkill(attacker, defender, skill, who) {
  const isPlayer = who === 'player';
  const logType = isPlayer ? 'player' : 'enemy';

  switch (skill.type) {
    case 'attack': {
      const result = calcDamage(attacker, defender, skill);
      defender.hp = Math.max(0, defender.hp - result.damage);

      if (skill.drain) {
        const healAmount = Math.floor(result.damage * skill.drain);
        attacker.hp = Math.min(attacker.maxHp, attacker.hp + healAmount);
        addLog(`${attacker.name} 吸取了 ${healAmount} HP`, logType);
      }

      if (skill.debuffType) {
        const debuffs = isPlayer ? battleState.enemyDebuffs : battleState.playerDebuffs;
        debuffs.push({ type: skill.debuffType, value: skill.debuffValue, remaining: skill.duration });
      }

      if (skill.dotType) {
        const dots = isPlayer ? battleState.enemyDot : battleState.playerDot;
        dots.push({ type: skill.dotType, value: skill.dotValue, remaining: skill.duration });
      }

      if (isPlayer) {
        battleState.totalDamageDealt += result.damage;
        if (result.isCrit) battleState.criticalHits++;
      } else {
        battleState.totalDamageReceived += result.damage;
      }

      let logText = `${attacker.name} 使用 ${skill.name} 造成 ${result.damage} 伤害`;
      addLog(logText, result.isCrit ? 'critical' : logType);

      showDamage(isPlayer ? 'enemy' : 'player', result.damage, result.isCrit, false);
      flashScreen(isPlayer ? 'cyan' : 'red');

      const defSprite = document.getElementById(isPlayer ? 'enemy-sprite' : 'player-sprite');
      if (defSprite) {
        defSprite.classList.add('hurt');
        setTimeout(() => defSprite.classList.remove('hurt'), 500);
      }
      break;
    }
    case 'restore': {
      const stat = skill.restoreType;
      const value = skill.restoreValue;
      if (stat === 'hp') {
        const actual = Math.min(value, attacker.maxHp - attacker.hp);
        attacker.hp += actual;
        if (isPlayer) battleState.totalHealed += actual;
        addLog(`${attacker.name} 恢复 ${actual} HP`, logType);
        showDamage(isPlayer ? 'player' : 'enemy', actual, false, true);
      } else if (stat === 'mp') {
        const actual = Math.min(value, attacker.maxMp - attacker.mp);
        attacker.mp += actual;
        addLog(`${attacker.name} 恢复 ${actual} MP`, logType);
      }
      flashScreen('yellow');
      break;
    }
    case 'buff': {
      const buffs = isPlayer ? battleState.playerBuffs : battleState.enemyBuffs;
      buffs.push({ type: skill.buffType, value: skill.buffValue, remaining: skill.duration });
      if (skill.buffType === 'atk') attacker.atk = Math.floor(attacker.atk * skill.buffValue);
      if (skill.buffType === 'def') attacker.def = Math.floor(attacker.def * skill.buffValue);
      if (skill.buffType === 'spd') attacker.spd = Math.floor(attacker.spd * skill.buffValue);
      addLog(`${attacker.name} ${skill.name} 提升 ${skill.buffType}`, logType);
      flashScreen('yellow');
      break;
    }
    case 'special': {
      if (skill.specialType === 'berserk') {
        const hpCost = Math.floor(attacker.maxHp * 0.15);
        attacker.hp -= hpCost;
        attacker.atk = Math.floor(attacker.atk * 1.8);
        addLog(`${attacker.name} 狂暴模式启动! 攻击力大幅提升`, logType);
        showDamage(isPlayer ? 'player' : 'enemy', hpCost, false, false);
      }
      break;
    }
  }
}

// 回合结束处理
function processTurnEnd(who) {
  const isPlayer = who === 'player';
  const dots = isPlayer ? battleState.enemyDot : battleState.playerDot;
  const target = isPlayer ? enemy : player;

  for (let i = dots.length - 1; i >= 0; i--) {
    target.hp = Math.max(0, target.hp - dots[i].value);
    addLog(`${target.name} 受到 ${dots[i].type} 伤害 ${dots[i].value}`, isPlayer ? 'player' : 'enemy');
    dots[i].remaining--;
    if (dots[i].remaining <= 0) dots.splice(i, 1);
  }

  const buffs = isPlayer ? battleState.playerBuffs : battleState.enemyBuffs;
  for (let i = buffs.length - 1; i >= 0; i--) {
    buffs[i].remaining--;
    if (buffs[i].remaining <= 0) {
      const fighter = isPlayer ? player : enemy;
      if (buffs[i].type === 'atk') fighter.atk = Math.floor(fighter.atk / buffs[i].value);
      if (buffs[i].type === 'def') fighter.def = Math.floor(fighter.def / buffs[i].value);
      if (buffs[i].type === 'spd') fighter.spd = Math.floor(fighter.spd / buffs[i].value);
      buffs.splice(i, 1);
    }
  }

  const debuffs = isPlayer ? battleState.enemyDebuffs : battleState.playerDebuffs;
  for (let i = debuffs.length - 1; i >= 0; i--) {
    debuffs[i].remaining--;
    if (debuffs[i].remaining <= 0) {
      const fighter = isPlayer ? enemy : player;
      if (debuffs[i].type === 'atk') fighter.atk = Math.floor(fighter.atk / debuffs[i].value);
      if (debuffs[i].type === 'def') fighter.def = Math.floor(fighter.def / debuffs[i].value);
      debuffs.splice(i, 1);
    }
  }
}

// 检查战斗结束
function checkBattleEnd() {
  if (enemy.hp <= 0) {
    setTimeout(() => showResult(true), 800);
    return true;
  }
  if (player.hp <= 0) {
    setTimeout(() => showResult(false), 800);
    return true;
  }
  battleState.isAnimating = false;
  return false;
}

// 显示结果
function showResult(isWin) {
  showScreen('result');
  const title = document.getElementById('result-title');
  title.textContent = isWin ? 'MISSION COMPLETE' : 'SYSTEM FAILURE';
  title.className = `result-title ${isWin ? 'result-win' : 'result-lose'}`;
  
  document.getElementById('result-stats').innerHTML = `
    <div style="color: var(--neon-cyan);">目标: ${enemy.name}</div>
    <div>战斗回合: ${battleState.round}</div>
    <div>造成伤害: ${battleState.totalDamageDealt}</div>
    <div>承受伤害: ${battleState.totalDamageReceived}</div>
    <div>修复总量: ${battleState.totalHealed}</div>
    <div>暴击次数: ${battleState.criticalHits}</div>
    <div style="color: ${isWin ? 'var(--neon-green)' : 'var(--neon-red)'}; margin-top: 15px;">
      ${isWin ? '战斗效率: EXCELLENT' : '建议: 升级装备后重试'}
    </div>
  `;
}

// 初始化
showScreen('start');
</script>
