<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>赛博纪元 - 卡牌对战</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --neon-blue: #00d4ff;
  --neon-purple: #b44aff;
  --neon-pink: #ff44aa;
  --dark-bg: #0a0a1a;
  --field-bg: #0d0d2b;
  --card-w: 70px;
  --card-h: 100px;
}
html, body { width:100%; height:100%; overflow:hidden; font-family:'Orbitron',sans-serif; background:var(--dark-bg); color:#fff; }

/* GAME CONTAINER */
#game {
  width:100vw; height:100vh;
  display:flex; flex-direction:column;
  background: radial-gradient(ellipse at center, #0d0d3b 0%, #050515 100%);
  position:relative; overflow:hidden;
}

/* FIELD BACKGROUND */
#game::before {
  content:''; position:absolute; inset:0;
  background:
    linear-gradient(0deg, transparent 48%, rgba(0,212,255,0.05) 49%, rgba(0,212,255,0.05) 51%, transparent 52%),
    linear-gradient(90deg, transparent 48%, rgba(0,212,255,0.03) 49%, rgba(0,212,255,0.03) 51%, transparent 52%);
  pointer-events:none; z-index:0;
}

/* TOP BAR - Enemy Info */
#enemy-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 8px; z-index:10; flex-shrink:0;
  background:linear-gradient(180deg, rgba(20,0,40,0.9), transparent);
}
.lp-display {
  font-size:11px; font-weight:700;
  text-shadow:0 0 10px var(--neon-pink);
  min-width:80px;
}
.lp-display span { font-size:16px; }
#enemy-lp span { color:var(--neon-pink); }
#player-lp span { color:var(--neon-blue); }
.deck-info { font-size:9px; color:#888; text-align:center; }
.deck-info div { margin:1px 0; }

/* FIELD AREA */
#field {
  flex:1; display:flex; flex-direction:column;
  justify-content:space-between;
  padding:2px 4px; z-index:5;
  min-height:0;
}

/* ZONE ROW */
.zone-row {
  display:flex; align-items:center; justify-content:center;
  gap:3px; flex-shrink:0;
}
.side-zones {
  display:flex; flex-direction:column; gap:2px;
  align-items:center; min-width:36px;
}
.monster-zone {
  display:flex; gap:3px; justify-content:center;
}
.spell-zone {
  display:flex; gap:2px; justify-content:center;
}

/* CARD SLOTS */
.card-slot {
  width:var(--card-w); height:var(--card-h);
  border:1px dashed rgba(0,212,255,0.2);
  border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  background:rgba(0,212,255,0.03);
  transition:all 0.2s;
}
.card-slot.highlight {
  border-color:var(--neon-blue);
  box-shadow:0 0 10px rgba(0,212,255,0.4);
  background:rgba(0,212,255,0.1);
}
.card-slot.attack-target {
  border-color:#ff4444;
  box-shadow:0 0 15px rgba(255,0,0,0.5);
  animation:pulse-red 0.5s infinite;
}
@keyframes pulse-red {
  0%,100% { box-shadow:0 0 10px rgba(255,0,0,0.3); }
  50% { box-shadow:0 0 20px rgba(255,0,0,0.7); }
}

/* SMALL SLOTS for deck/graveyard */
.small-slot {
  width:36px; height:50px;
  border:1px solid rgba(0,212,255,0.3);
  border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; color:#666;
  cursor:pointer;
  position:relative;
  background:rgba(0,0,0,0.3);
}
.small-slot:hover { border-color:var(--neon-blue); }
.small-slot .count {
  position:absolute; bottom:-2px; right:-2px;
  background:rgba(0,0,0,0.8); color:var(--neon-blue);
  font-size:8px; padding:0 3px; border-radius:3px;
}

/* PHASE INDICATOR */
#phase-bar {
  text-align:center; padding:2px 0; z-index:10; flex-shrink:0;
}
#phase-text {
  font-size:10px; color:var(--neon-purple);
  text-shadow:0 0 10px var(--neon-purple);
  letter-spacing:2px;
}

/* CARDS */
.card {
  width:var(--card-w); height:var(--card-h);
  border-radius:6px; position:relative;
  cursor:pointer; transition:transform 0.2s, box-shadow 0.2s;
  transform-style:preserve-3d; perspective:300px;
  flex-shrink:0;
}
.card:hover { transform:translateY(-5px); z-index:20; }
.card.monster-card {
  background:linear-gradient(135deg, #8B4513, #D2691E, #8B4513);
  border:2px solid #DAA520;
}
.card.spell-card {
  background:linear-gradient(135deg, #006400, #228B22, #006400);
  border:2px solid #32CD32;
}
.card.trap-card {
  background:linear-gradient(135deg, #4B0082, #8B008B, #4B0082);
  border:2px solid #DA70D6;
}
.card.selected {
  box-shadow:0 0 20px var(--neon-blue), 0 0 40px rgba(0,212,255,0.3);
  transform:translateY(-8px);
}
.card.facedown {
  background:linear-gradient(135deg, #1a1a4a, #2a2a6a, #1a1a4a) !important;
  border-color:#444 !important;
}
.card.facedown .card-inner { display:none; }
.card.facedown::after {
  content:''; position:absolute; inset:4px;
  border:2px solid rgba(0,212,255,0.3); border-radius:4px;
  background:repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,212,255,0.05) 5px, rgba(0,212,255,0.05) 10px);
}

.card-inner {
  width:100%; height:100%; display:flex; flex-direction:column;
  padding:2px; overflow:hidden; border-radius:4px;
}
.card-name {
  font-size:7px; font-weight:700; text-align:center;
  color:#FFD700; text-shadow:0 0 3px rgba(0,0,0,0.8);
  line-height:1.1; padding:1px;
  background:rgba(0,0,0,0.5); border-radius:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-art {
  flex:1; margin:2px; border-radius:3px; overflow:hidden;
  background:#000; position:relative;
}
.card-art img {
  width:100%; height:100%; object-fit:cover;
}
.card-art .spell-icon, .card-art .trap-icon {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.spell-card .card-art .spell-icon {
  background:radial-gradient(circle, rgba(0,100,0,0.5), transparent);
}
.trap-card .card-art .trap-icon {
  background:radial-gradient(circle, rgba(75,0,130,0.5), transparent);
}
.card-level {
  display:flex; gap:1px; padding:0 2px;
}
.card-level .star {
  font-size:6px; color:#FFD700;
  text-shadow:0 0 2px #000;
}
.card-type {
  font-size:5px; color:#ccc; text-align:center;
  padding:0 2px;
}
.card-stats {
  display:flex; justify-content:space-between;
  font-size:7px; font-weight:700; padding:1px 3px;
  background:rgba(0,0,0,0.6); border-radius:2px;
}
.card-stats .atk { color:#ff6666; }
.card-stats .def { color:#6666ff; }
.card-desc {
  font-size:5px; color:#aaa; text-align:center;
  padding:0 2px; line-height:1.2;
  flex-shrink:0;
}

/* DEFENSE POSITION */
.card.defense-pos {
  transform:rotate(90deg);
}
.card.defense-pos:hover {
  transform:rotate(90deg) translateY(-5px);
}

/* HAND AREA */
#hand-area {
  z-index:15; flex-shrink:0;
  padding:2px 4px 4px;
  background:linear-gradient(0deg, rgba(0,0,30,0.9), transparent);
}
#hand {
  display:flex; gap:4px; overflow-x:auto;
  padding:4px 2px;
  scrollbar-width:none;
}
#hand::-webkit-scrollbar { display:none; }
#hand .card {
  flex-shrink:0;
  transition:transform 0.2s;
}
#hand .card:hover {
  transform:translateY(-15px) scale(1.05);
}

/* ACTION BUTTONS */
#actions {
  display:flex; gap:6px; justify-content:center;
  padding:4px 8px; z-index:20; flex-shrink:0;
  background:rgba(0,0,20,0.8);
}
.btn {
  padding:6px 14px; border:1px solid var(--neon-blue);
  background:rgba(0,212,255,0.1); color:var(--neon-blue);
  font-family:'Orbitron',sans-serif; font-size:10px;
  border-radius:4px; cursor:pointer;
  text-transform:uppercase; letter-spacing:1px;
  transition:all 0.2s;
}
.btn:hover { background:rgba(0,212,255,0.3); box-shadow:0 0 15px rgba(0,212,255,0.3); }
.btn:active { transform:scale(0.95); }
.btn.danger { border-color:var(--neon-pink); color:var(--neon-pink); background:rgba(255,68,170,0.1); }
.btn.danger:hover { background:rgba(255,68,170,0.3); }
.btn:disabled { opacity:0.3; pointer-events:none; }
.btn.battle { border-color:#ffaa00; color:#ffaa00; background:rgba(255,170,0,0.1); }
.btn.battle:hover { background:rgba(255,170,0,0.3); }

/* SUMMONING ANIMATION */
@keyframes summon-card {
  0% { transform:translateY(100px) rotateY(180deg) scale(0.3); opacity:0; }
  40% { transform:translateY(0) rotateY(90deg) scale(0.8); opacity:0.8; }
  70% { transform:translateY(-10px) rotateY(0deg) scale(1.1); opacity:1; }
  100% { transform:translateY(0) rotateY(0deg) scale(1); opacity:1; }
}
.card.summoning {
  animation:summon-card 0.6s ease-out;
  z-index:50;
}

/* SUMMON CIRCLE */
@keyframes summon-circle {
  0% { transform:translate(-50%,-50%) rotate(0deg) scale(0); opacity:0; }
  30% { transform:translate(-50%,-50%) rotate(120deg) scale(1); opacity:1; }
  100% { transform:translate(-50%,-50%) rotate(720deg) scale(1.5); opacity:0; }
}
.summon-circle {
  position:absolute; top:50%; left:50%;
  width:120px; height:120px;
  border:3px solid var(--neon-blue);
  border-radius:50%;
  pointer-events:none; z-index:40;
  animation:summon-circle 0.8s ease-out forwards;
  box-shadow:0 0 20px var(--neon-blue), inset 0 0 20px var(--neon-blue);
}

/* ATTACK ANIMATION */
@keyframes attack-move {
  0% { transform:translateX(0); }
  40% { transform:translateX(30px) scale(1.1); }
  60% { transform:translateX(30px) scale(1.1); }
  100% { transform:translateX(0); }
}
.card.attacking {
  animation:attack-move 0.5s ease-in-out;
  z-index:50;
}

/* DAMAGE EFFECT */
@keyframes damage-flash {
  0%,100% { filter:none; }
  25% { filter:brightness(3) hue-rotate(180deg); }
  50% { filter:brightness(0.5); }
  75% { filter:brightness(2); }
}
.damage-flash { animation:damage-flash 0.4s; }

/* SCREEN SHAKE */
@keyframes screen-shake {
  0%,100% { transform:translate(0); }
  10% { transform:translate(-3px,2px); }
  20% { transform:translate(3px,-2px); }
  30% { transform:translate(-2px,3px); }
  40% { transform:translate(2px,-3px); }
  50% { transform:translate(-3px,1px); }
  60% { transform:translate(3px,-1px); }
  70% { transform:translate(-1px,3px); }
  80% { transform:translate(1px,-2px); }
  90% { transform:translate(-2px,1px); }
}
.screen-shake { animation:screen-shake 0.3s; }

/* FLOATING DAMAGE */
@keyframes float-damage {
  0% { transform:translateY(0) scale(0.5); opacity:0; }
  20% { transform:translateY(-10px) scale(1.2); opacity:1; }
  100% { transform:translateY(-50px) scale(1); opacity:0; }
}
.damage-number {
  position:absolute; font-size:18px; font-weight:900;
  color:#ff4444; text-shadow:0 0 10px #ff0000;
  pointer-events:none; z-index:100;
  animation:float-damage 1s ease-out forwards;
}

/* DESTROY EFFECT */
@keyframes destroy-card {
  0% { transform:scale(1); opacity:1; filter:brightness(1); }
  30% { transform:scale(1.2); filter:brightness(3); }
  100% { transform:scale(0) rotate(180deg); opacity:0; filter:brightness(0); }
}
.card.destroying {
  animation:destroy-card 0.5s ease-in forwards;
  z-index:50;
}

/* PARTICLES */
@keyframes particle-burst {
  0% { transform:translate(0,0) scale(1); opacity:1; }
  100% { transform:translate(var(--px),var(--py)) scale(0); opacity:0; }
}
.particle {
  position:absolute; width:4px; height:4px;
  border-radius:50%; pointer-events:none; z-index:60;
  animation:particle-burst 0.6s ease-out forwards;
}

/* CARD TOOLTIP */
#tooltip {
  display:none; position:fixed; z-index:1000;
  width:160px; padding:8px;
  background:rgba(10,10,30,0.95);
  border:1px solid var(--neon-blue);
  border-radius:8px;
  box-shadow:0 0 20px rgba(0,212,255,0.3);
  pointer-events:none;
  font-size:10px;
}
#tooltip .tt-name { color:#FFD700; font-weight:700; font-size:12px; margin-bottom:4px; }
#tooltip .tt-type { color:#aaa; font-size:9px; margin-bottom:4px; }
#tooltip .tt-desc { color:#ccc; font-size:9px; line-height:1.3; }
#tooltip .tt-stats { color:#fff; font-size:10px; margin-top:4px; }
#tooltip .tt-stats .atk { color:#ff6666; }
#tooltip .tt-stats .def { color:#6666ff; }

/* OVERLAY */
#overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.7);
  align-items:center; justify-content:center;
  flex-direction:column;
}
#overlay.show { display:flex; }
#overlay h2 {
  font-size:24px; color:var(--neon-blue);
  text-shadow:0 0 20px var(--neon-blue);
  margin-bottom:20px;
}
#overlay .btn { font-size:14px; padding:10px 30px; }

/* GRAVEYARD VIEWER */
#grave-viewer {
  display:none; position:fixed; inset:0; z-index:150;
  background:rgba(0,0,0,0.8);
  overflow-y:auto; padding:20px;
}
#grave-viewer.show { display:block; }
#grave-viewer h3 { color:var(--neon-purple); margin-bottom:10px; }
#grave-viewer .grave-cards { display:flex; flex-wrap:wrap; gap:8px; }
#grave-viewer .close-grave {
  position:fixed; top:10px; right:10px;
  font-size:20px; cursor:pointer; color:#fff;
}

/* RESPONSIVE */
@media (max-width:400px) {
  :root { --card-w:58px; --card-h:84px; }
  .card-name { font-size:6px; }
  .card-stats { font-size:6px; }
  .card-level .star { font-size:5px; }
  .card-type { font-size:4px; }
  .btn { padding:5px 10px; font-size:9px; }
  .lp-display { font-size:9px; }
  .lp-display span { font-size:13px; }
}
@media (min-width:600px) {
  :root { --card-w:85px; --card-h:120px; }
  .card-name { font-size:8px; }
  .card-stats { font-size:8px; }
}

/* TRIBUTE INDICATOR */
.card.tribute-target {
  border-color:#ffaa00 !important;
  box-shadow:0 0 15px rgba(255,170,0,0.5) !important;
}

/* EQUIP INDICATOR */
.equip-indicator {
  position:absolute; top:-4px; right:-4px;
  width:14px; height:14px; border-radius:50%;
  background:var(--neon-blue);
  border:1px solid #fff;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; z-index:5;
}

/* VS SECTION */
.vs-section {
  display:flex; align-items:center; justify-content:center;
  padding:1px 0; flex-shrink:0;
}
.vs-text {
  font-size:9px; color:rgba(0,212,255,0.3);
  letter-spacing:3px;
}

/* POSITION INDICATOR */
.pos-indicator {
  position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  font-size:6px; padding:0 3px; border-radius:2px;
  background:rgba(0,0,0,0.7);
}
.pos-indicator.atk { color:#ff6666; }
.pos-indicator.def { color:#6666ff; }

/* MESSAGE LOG */
#message {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:300; font-size:16px; font-weight:700;
  color:#fff; text-shadow:0 0 20px var(--neon-blue);
  pointer-events:none; opacity:0;
  transition:opacity 0.3s;
  text-align:center;
}
#message.show { opacity:1; }

/* Chain link effect */
@keyframes chain-link {
  0% { opacity:0; transform:scale(0.5); }
  50% { opacity:1; transform:scale(1.1); }
  100% { opacity:0; transform:scale(0.8); }
}
</style>
</head>
<body>
<div id="game">
  <!-- Enemy Bar -->
  <div id="enemy-bar">
    <div class="lp-display" id="enemy-lp">AI LP: <span>4000</span></div>
    <div class="deck-info">
      <div>卡组: <span id="enemy-deck-count">15</span></div>
      <div>墓地: <span id="enemy-grave-count">0</span></div>
    </div>
  </div>

  <!-- Field -->
  <div id="field">
    <!-- Enemy Spell/Trap Zone -->
    <div class="zone-row">
      <div class="side-zones">
        <div class="small-slot" id="enemy-deck" onclick="viewGrave('enemy-deck')">
          <span style="font-size:14px;">&#x1F0CF;</span>
          <span class="count" id="edc">15</span>
        </div>
      </div>
      <div class="spell-zone" id="enemy-spell-zone"></div>
      <div class="side-zones">
        <div class="small-slot" id="enemy-grave" onclick="viewGrave('enemy-grave')">
          <span style="font-size:10px;">墓</span>
          <span class="count" id="egc">0</span>
        </div>
      </div>
    </div>

    <!-- Enemy Monster Zone -->
    <div class="zone-row">
      <div class="monster-zone" id="enemy-monster-zone"></div>
    </div>

    <!-- VS -->
    <div class="vs-section"><span class="vs-text">- - VS - -</span></div>

    <!-- Player Monster Zone -->
    <div class="zone-row">
      <div class="monster-zone" id="player-monster-zone"></div>
    </div>

    <!-- Player Spell/Trap Zone -->
    <div class="zone-row">
      <div class="side-zones">
        <div class="small-slot" id="player-deck">
          <span style="font-size:14px;">&#x1F0CF;</span>
          <span class="count" id="pdc">15</span>
        </div>
      </div>
      <div class="spell-zone" id="player-spell-zone"></div>
      <div class="side-zones">
        <div class="small-slot" id="player-grave" onclick="viewGrave('player-grave')">
          <span style="font-size:10px;">墓</span>
          <span class="count" id="pgc">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Phase Bar -->
  <div id="phase-bar"><span id="phase-text">准备阶段</span></div>

  <!-- Hand -->
  <div id="hand-area"><div id="hand"></div></div>

  <!-- Actions -->
  <div id="actions">
    <button class="btn battle" id="btn-battle" onclick="enterBattlePhase()" disabled>战斗阶段</button>
    <button class="btn" id="btn-end" onclick="endTurn()" disabled>结束回合</button>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Message -->
<div id="message"></div>

<!-- Overlay -->
<div id="overlay">
  <h2 id="overlay-title"></h2>
  <button class="btn" onclick="startGame()">开始游戏</button>
</div>

<!-- Grave Viewer -->
<div id="grave-viewer">
  <span class="close-grave" onclick="closeGrave()">&times;</span>
  <h3 id="grave-title">墓地</h3>
  <div class="grave-cards" id="grave-cards"></div>
</div>

// ==================== GAME STATE ====================
let G = {};

function initGameState() {
  G = {
    phase: 'start',
    turn: 'player',
    playerLP: 4000,
    enemyLP: 4000,
    playerDeck: [],
    enemyDeck: [],
    playerHand: [],
    enemyHand: [],
    playerMonsters: [null,null,null,null,null],
    enemyMonsters: [null,null,null,null,null],
    playerSpells: [null,null,null],
    enemySpells: [null,null,null],
    playerGrave: [],
    enemyGrave: [],
    selectedCard: null,
    selectedZone: null,
    battleMode: false,
    attackCount: 0,
    summonedThisTurn: false,
    normalSummonedThisTurn: false,
    tributeMode: false,
    tributeTarget: null,
    equipTarget: null,
    gameOver: false,
    trapCheck: null,
    animating: false
  };
}

// ==================== DECK BUILDING ====================
function buildPlayerDeck() {
  return [
    'cyber_dragon','cyber_dragon','cyber_dragon',
    'dark_mage','dark_mage',
    'flame_swordsman','flame_swordsman',
    'mystic_elf',
    'darkness_eye',
    'blue_eyes',
    'summoned_skull',
    'monster_reborn','raigeki','reinforcements','plasma_blade',
    'attack_null'
  ];
}

function buildEnemyDeck() {
  return [
    'curse_of_dragon','curse_of_dragon','curse_of_dragon',
    'darkness_eye','darkness_eye',
    'summoned_skull','summoned_skull',
    'blue_eyes',
    'gaia',
    'monster_reborn','raigeki','plasma_blade',
    'trap_hole','torrential','attack_null'
  ];
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function createCardInstance(cardId) {
  const base = CARD_DB[cardId];
  return {
    ...base,
    uid: Math.random().toString(36).substr(2,9),
    currentAtk: base.atk || 0,
    currentDef: base.def || 0,
    position: 'attack', // attack or defense
    faceUp: true,
    canAttack: true,
    equipped: null,
    turnSummoned: false
  };
}

// ==================== GAME FLOW ====================
function startGame() {
  document.getElementById('overlay').classList.remove('show');
  initGameState();
  G.playerDeck = shuffle(buildPlayerDeck()).map(id => createCardInstance(id));
  G.enemyDeck = shuffle(buildEnemyDeck()).map(id => createCardInstance(id));
  // Draw 5 cards each
  for(let i=0;i<5;i++) {
    drawCard('player');
    drawCard('enemy');
  }
  G.phase = 'draw';
  G.turn = 'player';
  render();
  showMessage('游戏开始！你的回合！');
  setTimeout(() => {
    playerDrawPhase();
  }, 800);
}

function drawCard(who) {
  const deck = who==='player' ? G.playerDeck : G.enemyDeck;
  const hand = who==='player' ? G.playerHand : G.enemyHand;
  if(deck.length > 0) {
    const card = deck.pop();
    hand.push(card);
    return card;
  }
  return null;
}

function playerDrawPhase() {
  G.phase = 'draw';
  G.turn = 'player';
  G.summonedThisTurn = false;
  G.normalSummonedThisTurn = false;
  G.attackCount = 0;
  G.battleMode = false;
  G.selectedCard = null;
  G.tributeMode = false;

  drawCard('player');
  showMessage('抽卡阶段');
  render();

  setTimeout(() => {
    G.phase = 'main1';
    showMessage('主要阶段1');
    render();
  }, 600);
}

function enterBattlePhase() {
  if(G.phase !== 'main1' || G.turn !== 'player' || G.animating) return;
  G.phase = 'battle';
  G.battleMode = true;
  G.selectedCard = null;
  showMessage('战斗阶段 - 选择怪兽攻击');
  render();
}

function endTurn() {
  if(G.turn !== 'player' || G.animating) return;
  G.selectedCard = null;
  G.battleMode = false;
  G.tributeMode = false;
  G.equipTarget = null;

  // Reset player monsters
  G.playerMonsters.forEach(m => {
    if(m) { m.canAttack = true; m.turnSummoned = false; }
  });

  G.phase = 'enemy';
  G.turn = 'enemy';
  showMessage('对手回合');
  render();

  setTimeout(() => enemyTurn(), 1000);
}

// ==================== CARD PLAY ====================
function playCardFromHand(cardUid) {
  if(G.turn !== 'player' || G.phase !== 'main1' || G.animating) return;
  const idx = G.playerHand.findIndex(c => c.uid === cardUid);
  if(idx === -1) return;
  const card = G.playerHand[idx];

  if(card.type === 'monster') {
    if(G.normalSummonedThisTurn) {
      showMessage('每回合只能通常召唤一次');
      return;
    }
    const emptySlots = G.playerMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0);
    if(emptySlots.length === 0) {
      showMessage('怪兽区域已满');
      return;
    }
    if(card.level >= 5 && card.level <= 6) {
      // Need 1 tribute
      const tributables = G.playerMonsters.filter(m => m !== null);
      if(tributables.length === 0) {
        showMessage('需要解放1只怪兽');
        return;
      }
      G.tributeMode = true;
      G.selectedCard = card;
      G.tributeTarget = {level: card.level, count: 1};
      showMessage('选择要解放的怪兽');
      render();
      return;
    }
    if(card.level >= 7) {
      const tributables = G.playerMonsters.filter(m => m !== null);
      if(tributables.length < 2) {
        showMessage('需要解放2只怪兽');
        return;
      }
      G.tributeMode = true;
      G.selectedCard = card;
      G.tributeTarget = {level: card.level, count: 2};
      showMessage('选择要解放的怪兽');
      render();
      return;
    }
    // Normal summon (4-star or below)
    G.playerHand.splice(idx, 1);
    const slot = emptySlots[0];
    card.faceUp = true;
    card.position = 'attack';
    card.turnSummoned = true;
    G.playerMonsters[slot] = card;
    G.normalSummonedThisTurn = true;
    G.summonedThisTurn = true;
    showMessage('召唤 ' + card.name);
    render();
    animateSummon(slot, 'player');
    // Check enemy traps
    setTimeout(() => checkTrapsOnSummon(slot, 'player'), 600);
  }
  else if(card.type === 'spell') {
    activateSpellFromHand(card, idx);
  }
  else if(card.type === 'trap') {
    // Set trap
    const emptySlots = G.playerSpells.map((m,i) => m===null?i:-1).filter(i=>i>=0);
    if(emptySlots.length === 0) {
      showMessage('魔法陷阱区域已满');
      return;
    }
    G.playerHand.splice(idx, 1);
    card.faceUp = false;
    G.playerSpells[emptySlots[0]] = card;
    showMessage('设置 ' + card.name);
    render();
  }
}

function tributeMonster(slotIdx) {
  if(!G.tributeMode || G.turn !== 'player') return;
  const monster = G.playerMonsters[slotIdx];
  if(!monster) return;

  // Send to grave
  G.playerGrave.push(monster);
  G.playerMonsters[slotIdx] = null;

  if(G.tributeTarget.count === 2) {
    G.tributeTarget.count = 1;
    showMessage('再选择1只怪兽解放');
    render();
    return;
  }

  // Place the monster
  const card = G.selectedCard;
  const handIdx = G.playerHand.findIndex(c => c.uid === card.uid);
  if(handIdx !== -1) G.playerHand.splice(handIdx, 1);

  const emptySlots = G.playerMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0);
  const slot = emptySlots[0];
  card.faceUp = true;
  card.position = 'attack';
  card.turnSummoned = true;
  G.playerMonsters[slot] = card;
  G.normalSummonedThisTurn = true;
  G.summonedThisTurn = true;
  G.tributeMode = false;
  G.selectedCard = null;
  G.tributeTarget = null;
  showMessage('上级召唤 ' + card.name);
  render();
  animateSummon(slot, 'player');
  setTimeout(() => checkTrapsOnSummon(slot, 'player'), 600);
}

function activateSpellFromHand(card, handIdx) {
  if(card.subtype === 'equip') {
    // Need to select a monster
    const monsters = G.playerMonsters.filter(m => m !== null);
    if(monsters.length === 0) {
      showMessage('没有可装备的怪兽');
      return;
    }
    G.equipTarget = card;
    G.selectedCard = card;
    showMessage('选择要装备的怪兽');
    render();
    return;
  }

  G.playerHand.splice(handIdx, 1);

  if(card.id === 'monster_reborn') {
    if(G.playerGrave.length === 0) {
      showMessage('墓地没有怪兽');
      G.playerHand.splice(handIdx, 0, card);
      return;
    }
    // Show grave selection - simplified: revive strongest
    const monsters = G.playerGrave.filter(c => c.type === 'monster');
    if(monsters.length === 0) {
      showMessage('墓地没有怪兽');
      G.playerHand.splice(handIdx, 0, card);
      return;
    }
    monsters.sort((a,b) => b.atk - a.atk);
    const revived = monsters[0];
    G.playerGrave = G.playerGrave.filter(c => c.uid !== revived.uid);
    const emptySlots = G.playerMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0);
    if(emptySlots.length === 0) {
      showMessage('怪兽区域已满');
      G.playerHand.splice(handIdx, 0, card);
      return;
    }
    revived.currentAtk = revived.atk;
    revived.currentDef = revived.def;
    revived.faceUp = true;
    revived.position = 'attack';
    revived.turnSummoned = true;
    G.playerMonsters[emptySlots[0]] = revived;
    G.playerGrave.push(card);
    showMessage('复活了 ' + revived.name);
    render();
    animateSummon(emptySlots[0], 'player');
  }
  else if(card.id === 'raigeki') {
    G.playerGrave.push(card);
    let destroyed = 0;
    G.enemyMonsters.forEach((m,i) => {
      if(m) {
        G.enemyGrave.push(m);
        animateDestroy(i, 'enemy');
        destroyed++;
      }
    });
    G.enemyMonsters = [null,null,null,null,null];
    if(destroyed > 0) {
      screenShake();
      showMessage('雷击！摧毁了' + destroyed + '只怪兽！');
    } else {
      showMessage('对手场上没有怪兽');
    }
    render();
  }
  else if(card.id === 'reinforcements') {
    G.playerGrave.push(card);
    drawCard('player');
    drawCard('player');
    showMessage('增援！抽了2张卡');
    render();
  }
  else if(card.id === 'polymerization') {
    // Simplified: remove 2 monsters, add Blue-Eyes if possible
    const monsters = G.playerMonsters.filter(m => m !== null);
    if(monsters.length < 2) {
      showMessage('需要场上2只怪兽');
      G.playerHand.splice(handIdx, 0, card);
      return;
    }
    // Remove 2 weakest
    monsters.sort((a,b) => a.atk - b.atk);
    for(let i=0;i<2;i++) {
      const idx = G.playerMonsters.findIndex(m => m && m.uid === monsters[i].uid);
      if(idx >= 0) {
        G.playerGrave.push(G.playerMonsters[idx]);
        G.playerMonsters[idx] = null;
      }
    }
    // Summon Blue-Eyes
    const be = createCardInstance('blue_eyes');
    const emptySlots = G.playerMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0);
    if(emptySlots.length > 0) {
      be.turnSummoned = true;
      G.playerMonsters[emptySlots[0]] = be;
      G.playerGrave.push(card);
      showMessage('融合！青眼赛博龙降临！');
      render();
      animateSummon(emptySlots[0], 'player');
    }
  }
}

function equipMonster(slotIdx) {
  if(!G.equipTarget || G.turn !== 'player') return;
  const monster = G.playerMonsters[slotIdx];
  if(!monster) return;
  const spell = G.equipTarget;
  const handIdx = G.playerHand.findIndex(c => c.uid === spell.uid);
  if(handIdx !== -1) G.playerHand.splice(handIdx, 1);

  monster.currentAtk += 800;
  monster.equipped = spell;
  G.equipTarget = null;
  G.selectedCard = null;
  showMessage('装备了电磁之剑！ATK+800');
  render();
}

function activateTrap(trapCard, zoneIdx, who) {
  if(who === 'player') {
    G.playerSpells[zoneIdx] = null;
    G.playerGrave.push(trapCard);
  } else {
    G.enemySpells[zoneIdx] = null;
    G.enemyGrave.push(trapCard);
  }
}

// ==================== TRAP CHECKING ====================
function checkTrapsOnSummon(slotIdx, who) {
  const traps = who === 'player' ? G.enemySpells : G.playerSpells;
  const trapOwner = who === 'player' ? 'enemy' : 'player';

  for(let i=0; i<traps.length; i++) {
    const trap = traps[i];
    if(!trap || trap.type !== 'trap') continue;

    if(trap.id === 'trap_hole') {
      activateTrap(trap, i, trapOwner);
      const monsters = who === 'player' ? G.playerMonsters : G.enemyMonsters;
      const grave = who === 'player' ? G.playerGrave : G.enemyGrave;
      const target = monsters[slotIdx];
      if(target) {
        grave.push(target);
        monsters[slotIdx] = null;
        showMessage('陷阱洞！' + target.name + '被破坏！');
        animateDestroy(slotIdx, who);
        screenShake();
        render();
      }
      return;
    }
    if(trap.id === 'torrential') {
      activateTrap(trap, i, trapOwner);
      showMessage('激流葬！场上所有怪兽被破坏！');
      screenShake();
      G.playerMonsters.forEach((m,j) => {
        if(m) { G.playerGrave.push(m); animateDestroy(j,'player'); }
      });
      G.enemyMonsters.forEach((m,j) => {
        if(m) { G.enemyGrave.push(m); animateDestroy(j,'enemy'); }
      });
      G.playerMonsters = [null,null,null,null,null];
      G.enemyMonsters = [null,null,null,null,null];
      render();
      return;
    }
  }
}

function checkAttackTraps() {
  const traps = G.enemySpells;
  for(let i=0; i<traps.length; i++) {
    const trap = traps[i];
    if(!trap || trap.type !== 'trap') continue;
    if(trap.id === 'attack_null') {
      activateTrap(trap, i, 'enemy');
      showMessage('攻击无效化！');
      return true;
    }
  }
  return false;
}

// ==================== BATTLE ====================
function selectAttacker(slotIdx) {
  if(!G.battleMode || G.turn !== 'player' || G.animating) return;
  const monster = G.playerMonsters[slotIdx];
  if(!monster || !monster.canAttack || monster.position === 'defense') return;

  G.selectedCard = monster;
  G.selectedZone = slotIdx;
  showMessage('选择攻击目标');
  render();
}

function selectAttackTarget(slotIdx) {
  if(!G.battleMode || G.turn !== 'player' || !G.selectedCard || G.animating) return;
  const target = G.enemyMonsters[slotIdx];
  if(!target) return;

  const attacker = G.selectedCard;
  const atkSlot = G.selectedZone;

  // Check attack nullification trap
  if(checkAttackTraps()) {
    attacker.canAttack = false;
    G.selectedCard = null;
    G.selectedZone = null;
    render();
    return;
  }

  G.animating = true;
  G.selectedCard = null;
  G.selectedZone = null;

  // Attack animation
  animateAttack(atkSlot, slotIdx, () => {
    resolveBattle(attacker, atkSlot, target, slotIdx);
  });
}

function directAttack() {
  if(!G.battleMode || G.turn !== 'player' || !G.selectedCard || G.animating) return;
  const hasEnemyMonsters = G.enemyMonsters.some(m => m !== null);
  if(hasEnemyMonsters) {
    showMessage('对手有怪兽，不能直接攻击');
    return;
  }

  const attacker = G.selectedCard;
  const atkSlot = G.selectedZone;

  if(checkAttackTraps()) {
    attacker.canAttack = false;
    G.selectedCard = null;
    G.selectedZone = null;
    render();
    return;
  }

  G.animating = true;
  G.selectedCard = null;
  G.selectedZone = null;

  animateAttack(atkSlot, -1, () => {
    const dmg = attacker.currentAtk;
    G.enemyLP = Math.max(0, G.enemyLP - dmg);
    showDamageNumber(dmg, 'enemy');
    screenShake();
    showMessage('直接攻击！' + dmg + '点伤害！');
    attacker.canAttack = false;
    G.animating = false;
    render();
    checkWin();
  });
}

function resolveBattle(attacker, atkSlot, defender, defSlot) {
  const atk = attacker.currentAtk;

  if(defender.position === 'attack') {
    const defAtk = defender.currentAtk;
    if(atk > defAtk) {
      // Attacker wins
      const dmg = atk - defAtk;
      G.enemyLP = Math.max(0, G.enemyLP - dmg);
      G.enemyGrave.push(defender);
      G.enemyMonsters[defSlot] = null;
      animateDestroy(defSlot, 'enemy');
      showDamageNumber(dmg, 'enemy');
      screenShake();
      showMessage(attacker.name + ' 击败了 ' + defender.name + '！' + dmg + '点伤害！');
    } else if(atk < defAtk) {
      // Defender wins
      const dmg = defAtk - atk;
      G.playerLP = Math.max(0, G.playerLP - dmg);
      G.playerGrave.push(attacker);
      G.playerMonsters[atkSlot] = null;
      animateDestroy(atkSlot, 'player');
      showDamageNumber(dmg, 'player');
      screenShake();
      showMessage(attacker.name + ' 被 ' + defender.name + ' 击败！' + dmg + '点伤害！');
    } else {
      // Draw - both destroyed
      G.playerGrave.push(attacker);
      G.playerMonsters[atkSlot] = null;
      G.enemyGrave.push(defender);
      G.enemyMonsters[defSlot] = null;
      animateDestroy(atkSlot, 'player');
      animateDestroy(defSlot, 'enemy');
      showMessage('同归于尽！');
    }
  } else {
    // Defense position
    const defVal = defender.currentDef;
    if(atk > defVal) {
      G.enemyGrave.push(defender);
      G.enemyMonsters[defSlot] = null;
      animateDestroy(defSlot, 'enemy');
      showMessage(defender.name + '的防御被击破！');
    } else if(atk < defVal) {
      const dmg = defVal - atk;
      G.playerLP = Math.max(0, G.playerLP - dmg);
      showDamageNumber(dmg, 'player');
      screenShake();
      showMessage('攻击被反弹！' + dmg + '点伤害！');
    } else {
      showMessage('攻击被防御！');
    }
  }

  attacker.canAttack = false;
  G.animating = false;
  render();
  checkWin();
}

function checkWin() {
  if(G.enemyLP <= 0) {
    G.gameOver = true;
    setTimeout(() => {
      document.getElementById('overlay-title').textContent = '胜利！';
      document.getElementById('overlay').querySelector('.btn').textContent = '再来一局';
      document.getElementById('overlay').classList.add('show');
    }, 500);
  } else if(G.playerLP <= 0) {
    G.gameOver = true;
    setTimeout(() => {
      document.getElementById('overlay-title').textContent = '败北...';
      document.getElementById('overlay').querySelector('.btn').textContent = '再来一局';
      document.getElementById('overlay').classList.add('show');
    }, 500);
  }
}

// ==================== AI TURN ====================
function enemyTurn() {
  if(G.gameOver) return;
  G.phase = 'enemy-draw';
  G.summonedThisTurn = false;
  G.normalSummonedThisTurn = false;
  G.attackCount = 0;

  drawCard('enemy');
  render();

  setTimeout(() => {
    G.phase = 'enemy-main';
    aiMainPhase();
  }, 600);
}

function aiMainPhase() {
  if(G.gameOver) return;

  // Try to summon strongest monster
  const hand = G.enemyHand;
  const monsters = hand.filter(c => c.type === 'monster');
  const spells = hand.filter(c => c.type === 'spell');
  const traps = hand.filter(c => c.type === 'trap');

  // Sort monsters by ATK descending
  monsters.sort((a,b) => b.atk - a.atk);

  let summoned = false;

  for(const monster of monsters) {
    const emptySlots = G.enemyMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0);
    if(emptySlots.length === 0) break;

    if(monster.level >= 5 && monster.level <= 6) {
      const tributables = G.enemyMonsters.filter(m => m !== null);
      if(tributables.length > 0) {
        // Tribute weakest
        tributables.sort((a,b) => a.atk - b.atk);
        const tribute = tributables[0];
        const tIdx = G.enemyMonsters.findIndex(m => m && m.uid === tribute.uid);
        G.enemyGrave.push(tribute);
        G.enemyMonsters[tIdx] = null;
        const slot = G.enemyMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0)[0];
        monster.faceUp = true;
        monster.position = 'attack';
        monster.turnSummoned = true;
        G.enemyMonsters[slot] = monster;
        G.enemyHand = G.enemyHand.filter(c => c.uid !== monster.uid);
        G.normalSummonedThisTurn = true;
        showMessage('AI召唤了 ' + monster.name);
        render();
        animateSummon(slot, 'enemy');
        setTimeout(() => checkTrapsOnSummon(slot, 'enemy'), 600);
        summoned = true;
        break;
      }
    }
    else if(monster.level >= 7) {
      const tributables = G.enemyMonsters.filter(m => m !== null);
      if(tributables.length >= 2) {
        tributables.sort((a,b) => a.atk - b.atk);
        for(let i=0;i<2;i++) {
          const tIdx = G.enemyMonsters.findIndex(m => m && m.uid === tributables[i].uid);
          G.enemyGrave.push(G.enemyMonsters[tIdx]);
          G.enemyMonsters[tIdx] = null;
        }
        const slot = G.enemyMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0)[0];
        monster.faceUp = true;
        monster.position = 'attack';
        monster.turnSummoned = true;
        G.enemyMonsters[slot] = monster;
        G.enemyHand = G.enemyHand.filter(c => c.uid !== monster.uid);
        G.normalSummonedThisTurn = true;
        showMessage('AI上级召唤了 ' + monster.name);
        render();
        animateSummon(slot, 'enemy');
        setTimeout(() => checkTrapsOnSummon(slot, 'enemy'), 600);
        summoned = true;
        break;
      }
    }
    else if(!G.normalSummonedThisTurn) {
      const slot = emptySlots[0];
      monster.faceUp = true;
      monster.position = 'attack';
      monster.turnSummoned = true;
      G.enemyMonsters[slot] = monster;
      G.enemyHand = G.enemyHand.filter(c => c.uid !== monster.uid);
      G.normalSummonedThisTurn = true;
      showMessage('AI召唤了 ' + monster.name);
      render();
      animateSummon(slot, 'enemy');
      setTimeout(() => checkTrapsOnSummon(slot, 'enemy'), 600);
      summoned = true;
      break;
    }
  }

  // Set traps
  const emptySpellSlots = G.enemySpells.map((m,i) => m===null?i:-1).filter(i=>i>=0);
  const trapCards = G.enemyHand.filter(c => c.type === 'trap');
  for(const trap of trapCards) {
    if(emptySpellSlots.length === 0) break;
    const slot = emptySpellSlots.shift();
    trap.faceUp = false;
    G.enemySpells[slot] = trap;
    G.enemyHand = G.enemyHand.filter(c => c.uid !== trap.uid);
    showMessage('AI设置了陷阱');
  }

  // Try to use spells
  const remainingSpells = G.enemyHand.filter(c => c.type === 'spell');
  for(const spell of remainingSpells) {
    if(spell.id === 'raigeki') {
      const hasMonsters = G.playerMonsters.some(m => m !== null);
      if(hasMonsters) {
        G.enemyHand = G.enemyHand.filter(c => c.uid !== spell.uid);
        G.enemyGrave.push(spell);
        G.playerMonsters.forEach((m,i) => {
          if(m) { G.playerGrave.push(m); animateDestroy(i,'player'); }
        });
        G.playerMonsters = [null,null,null,null,null];
        screenShake();
        showMessage('AI使用了雷击！');
        render();
      }
    }
    else if(spell.id === 'monster_reborn') {
      const graveMonsters = G.enemyGrave.filter(c => c.type === 'monster');
      if(graveMonsters.length > 0) {
        const emptySlots = G.enemyMonsters.map((m,i) => m===null?i:-1).filter(i=>i>=0);
        if(emptySlots.length > 0) {
          graveMonsters.sort((a,b) => b.atk - a.atk);
          const revived = graveMonsters[0];
          G.enemyGrave = G.enemyGrave.filter(c => c.uid !== revived.uid);
          revived.currentAtk = revived.atk;
          revived.currentDef = revived.def;
          revived.faceUp = true;
          revived.position = 'attack';
          revived.turnSummoned = true;
          G.enemyMonsters[emptySlots[0]] = revived;
          G.enemyHand = G.enemyHand.filter(c => c.uid !== spell.uid);
          G.enemyGrave.push(spell);
          showMessage('AI复活了 ' + revived.name);
          render();
          animateSummon(emptySlots[0], 'enemy');
        }
      }
    }
    else if(spell.id === 'plasma_blade') {
      const aiMonsters = G.enemyMonsters.filter(m => m !== null);
      if(aiMonsters.length > 0) {
        aiMonsters.sort((a,b) => b.atk - a.atk);
        aiMonsters[0].currentAtk += 800;
        aiMonsters[0].equipped = spell;
        G.enemyHand = G.enemyHand.filter(c => c.uid !== spell.uid);
        showMessage('AI装备了电磁之剑');
        render();
      }
    }
    else if(spell.id === 'reinforcements') {
      G.enemyHand = G.enemyHand.filter(c => c.uid !== spell.uid);
      G.enemyGrave.push(spell);
      drawCard('enemy');
      drawCard('enemy');
      showMessage('AI使用了增援');
      render();
    }
  }

  // Battle phase
  setTimeout(() => {
    if(G.gameOver) return;
    G.phase = 'enemy-battle';
    aiBattlePhase();
  }, 1000);
}

function aiBattlePhase() {
  if(G.gameOver) return;

  const aiMonsters = G.enemyMonsters.filter(m => m !== null && m.canAttack && m.position === 'attack');
  const playerMonsters = G.playerMonsters.filter(m => m !== null);

  if(aiMonsters.length === 0) {
    aiEndTurn();
    return;
  }

  aiMonsters.sort((a,b) => b.currentAtk - a.currentAtk);

  let attackIdx = 0;
  function doNextAttack() {
    if(G.gameOver || attackIdx >= aiMonsters.length) {
      aiEndTurn();
      return;
    }
    const attacker = aiMonsters[attackIdx];
    if(!G.enemyMonsters.includes(attacker)) {
      attackIdx++;
      doNextAttack();
      return;
    }

    const currentTargets = G.playerMonsters.filter(m => m !== null);

    if(currentTargets.length === 0) {
      // Direct attack
      const atkSlotIdx = G.enemyMonsters.findIndex(m => m && m.uid === attacker.uid);
      G.animating = true;
      animateAttack(atkSlotIdx, -1, () => {
        // Check player traps
        let nullified = false;
        for(let i=0;i<G.playerSpells.length;i++) {
          const trap = G.playerSpells[i];
          if(trap && trap.type === 'trap' && trap.id === 'attack_null') {
            activateTrap(trap, i, 'player');
            showMessage('攻击无效化！');
            nullified = true;
            render();
            break;
          }
        }
        if(!nullified) {
          const dmg = attacker.currentAtk;
          G.playerLP = Math.max(0, G.playerLP - dmg);
          showDamageNumber(dmg, 'player');
          screenShake();
          showMessage('AI直接攻击！' + dmg + '点伤害！');
          render();
          checkWin();
        }
        attacker.canAttack = false;
        G.animating = false;
        attackIdx++;
        setTimeout(doNextAttack, 800);
      });
    } else {
      // Find advantageous target
      let bestTarget = null;
      let bestSlot = -1;
      let bestScore = -Infinity;

      for(let i=0;i<G.playerMonsters.length;i++) {
        const target = G.playerMonsters[i];
        if(!target) continue;
        let score = 0;
        if(target.position === 'attack') {
          if(attacker.currentAtk > target.currentAtk) {
            score = attacker.currentAtk - target.currentAtk; // Good, we destroy and deal damage
          } else if(attacker.currentAtk === target.currentAtk) {
            score = -target.currentAtk; // Trade, bad unless target is strong
          } else {
            score = -1000; // Bad, we lose
          }
        } else {
          if(attacker.currentAtk > target.currentDef) {
            score = 1; // Destroy defense
          } else if(attacker.currentAtk < target.currentDef) {
            score = -1000; // Take damage
          } else {
            score = 0; // Nothing happens
          }
        }
        if(score > bestScore) {
          bestScore = score;
          bestTarget = target;
          bestSlot = i;
        }
      }

      if(bestScore > 0 || (bestScore === 0 && currentTargets.length > 0 && attacker.currentAtk >= 2000)) {
        // Attack
        const atkSlotIdx = G.enemyMonsters.findIndex(m => m && m.uid === attacker.uid);
        G.animating = true;
        animateAttack(atkSlotIdx, bestSlot, () => {
          // Check player traps
          let nullified = false;
          for(let i=0;i<G.playerSpells.length;i++) {
            const trap = G.playerSpells[i];
            if(trap && trap.type === 'trap' && trap.id === 'attack_null') {
              activateTrap(trap, i, 'player');
              showMessage('攻击无效化！');
              nullified = true;
              render();
              break;
            }
          }
          if(!nullified) {
            const def = G.playerMonsters[bestSlot];
            if(def) {
              if(def.position === 'attack') {
                if(attacker.currentAtk > def.currentAtk) {
                  const dmg = attacker.currentAtk - def.currentAtk;
                  G.playerLP = Math.max(0, G.playerLP - dmg);
                  G.playerGrave.push(def);
                  G.playerMonsters[bestSlot] = null;
                  animateDestroy(bestSlot, 'player');
                  showDamageNumber(dmg, 'player');
                  screenShake();
                  render();
                  checkWin();
                } else if(attacker.currentAtk < def.currentAtk) {
                  const dmg = def.currentAtk - attacker.currentAtk;
                  G.enemyLP = Math.max(0, G.enemyLP - dmg);
                  G.enemyGrave.push(attacker);
                  const aSlot = G.enemyMonsters.findIndex(m => m && m.uid === attacker.uid);
                  if(aSlot >= 0) G.enemyMonsters[aSlot] = null;
                  animateDestroy(aSlot, 'enemy');
                  showDamageNumber(dmg, 'enemy');
                  screenShake();
                  render();
                  checkWin();
                } else {
                  G.playerGrave.push(def);
                  G.playerMonsters[bestSlot] = null;
                  G.enemyGrave.push(attacker);
                  const aSlot = G.enemyMonsters.findIndex(m => m && m.uid === attacker.uid);
                  if(aSlot >= 0) G.enemyMonsters[aSlot] = null;
                  animateDestroy(bestSlot, 'player');
                  animateDestroy(aSlot, 'enemy');
                  render();
                }
              } else {
                if(attacker.currentAtk > def.currentDef) {
                  G.playerGrave.push(def);
                  G.playerMonsters[bestSlot] = null;
                  animateDestroy(bestSlot, 'player');
                  render();
                } else if(attacker.currentAtk < def.currentDef) {
                  const dmg = def.currentDef - attacker.currentAtk;
                  G.enemyLP = Math.max(0, G.enemyLP - dmg);
                  showDamageNumber(dmg, 'enemy');
                  screenShake();
                  render();
                  checkWin();
                }
              }
            }
          }
          attacker.canAttack = false;
          G.animating = false;
          attackIdx++;
          setTimeout(doNextAttack, 800);
        });
      } else {
        // Skip this attacker
        attacker.canAttack = false;
        attackIdx++;
        doNextAttack();
      }
    }
  }

  doNextAttack();
}

function aiEndTurn() {
  if(G.gameOver) return;
  G.enemyMonsters.forEach(m => {
    if(m) { m.canAttack = true; m.turnSummoned = false; }
  });
  G.phase = 'player';
  G.turn = 'player';
  showMessage('你的回合！');
  render();
  setTimeout(() => playerDrawPhase(), 600);
}

// ==================== ANIMATIONS ====================
function animateSummon(slotIdx, who) {
  const zoneId = who === 'player' ? 'player-monster-zone' : 'enemy-monster-zone';
  const zone = document.getElementById(zoneId);
  const slot = zone.children[slotIdx];
  if(!slot) return;

  const card = slot.querySelector('.card');
  if(card) {
    card.classList.add('summoning');
    // Add summon circle
    const circle = document.createElement('div');
    circle.className = 'summon-circle';
    slot.appendChild(circle);
    // Particles
    createParticles(slot, '#00d4ff');
    setTimeout(() => {
      card.classList.remove('summoning');
      circle.remove();
    }, 800);
  }
}

function animateAttack(atkSlotIdx, defSlotIdx, callback) {
  const atkZone = document.getElementById('player-monster-zone');
  const atkSlot = atkZone.children[atkSlotIdx];
  if(!atkSlot) { callback(); return; }
  const card = atkSlot.querySelector('.card');
  if(card) {
    card.classList.add('attacking');
    setTimeout(() => {
      card.classList.remove('attacking');
      if(defSlotIdx >= 0) {
        const defZone = document.getElementById('enemy-monster-zone');
        const defSlot = defZone.children[defSlotIdx];
        if(defSlot) {
          createParticles(defSlot, '#ff4444');
          const defCard = defSlot.querySelector('.card');
          if(defCard) defCard.classList.add('damage-flash');
          setTimeout(() => { if(defCard) defCard.classList.remove('damage-flash'); }, 400);
        }
      }
      setTimeout(callback, 200);
    }, 500);
  } else {
    callback();
  }
}

function animateDestroy(slotIdx, who) {
  const zoneId = who === 'player' ? 'player-monster-zone' : 'enemy-monster-zone';
  const zone = document.getElementById(zoneId);
  const slot = zone.children[slotIdx];
  if(!slot) return;
  const card = slot.querySelector('.card');
  if(card) {
    createParticles(slot, '#ff8800');
    card.classList.add('destroying');
  }
}

function createParticles(parent, color) {
  for(let i=0;i<8;i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.background = color;
    p.style.left = '50%';
    p.style.top = '50%';
    const angle = (Math.PI*2/8)*i;
    const dist = 30 + Math.random()*30;
    p.style.setProperty('--px', Math.cos(angle)*dist + 'px');
    p.style.setProperty('--py', Math.sin(angle)*dist + 'px');
    parent.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}

function showDamageNumber(dmg, who) {
  const el = document.createElement('div');
  el.className = 'damage-number';
  el.textContent = '-' + dmg;
  if(who === 'enemy') {
    el.style.top = '60px';
    el.style.left = '50%';
    el.style.color = '#ff4444';
  } else {
    el.style.bottom = '100px';
    el.style.left = '50%';
    el.style.color = '#ff4444';
  }
  document.getElementById('game').appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function screenShake() {
  const game = document.getElementById('game');
  game.classList.add('screen-shake');
  setTimeout(() => game.classList.remove('screen-shake'), 300);
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 1500);
}

// ==================== GRAVE VIEWER ====================
function viewGrave(type) {
  const viewer = document.getElementById('grave-viewer');
  const title = document.getElementById('grave-title');
  const container = document.getElementById('grave-cards');

  let cards;
  if(type === 'player-grave') {
    title.textContent = '我方墓地';
    cards = G.playerGrave;
  } else if(type === 'enemy-grave') {
    title.textContent = '对手墓地';
    cards = G.enemyGrave;
  } else {
    return;
  }

  container.innerHTML = '';
  cards.forEach(card => {
    const el = createCardElement(card, true);
    el.style.cursor = 'default';
    container.appendChild(el);
  });

  viewer.classList.add('show');
}

function closeGrave() {
  document.getElementById('grave-viewer').classList.remove('show');
}

// ==================== RENDERING ====================
function render() {
  renderLP();
  renderDeckCounts();
  renderMonsterZone('player');
  renderMonsterZone('enemy');
  renderSpellZone('player');
  renderSpellZone('enemy');
  renderHand();
  renderPhase();
  renderButtons();
}

function renderLP() {
  document.querySelector('#enemy-lp span').textContent = G.enemyLP;
  document.querySelector('#player-lp span').textContent = G.playerLP;
}

function renderDeckCounts() {
  document.getElementById('edc').textContent = G.enemyDeck.length;
  document.getElementById('egc').textContent = G.enemyGrave.length;
  document.getElementById('pdc').textContent = G.playerDeck.length;
  document.getElementById('pgc').textContent = G.playerGrave.length;
  document.getElementById('enemy-deck-count').textContent = G.enemyDeck.length;
  document.getElementById('enemy-grave-count').textContent = G.enemyGrave.length;
}

function renderMonsterZone(who) {
  const zoneId = who + '-monster-zone';
  const zone = document.getElementById(zoneId);
  const monsters = who === 'player' ? G.playerMonsters : G.enemyMonsters;
  zone.innerHTML = '';

  monsters.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';

    if(G.battleMode && who === 'enemy' && G.selectedCard && card) {
      slot.classList.add('attack-target');
      slot.onclick = () => selectAttackTarget(i);
    }
    else if(G.battleMode && who === 'enemy' && G.selectedCard && !card) {
      // Direct attack option handled separately
    }
    else if(G.tributeMode && who === 'player' && card) {
      slot.classList.add('tribute-target');
      slot.onclick = () => tributeMonster(i);
    }
    else if(G.equipTarget && who === 'player' && card) {
      slot.classList.add('highlight');
      slot.onclick = () => equipMonster(i);
    }
    else if(G.battleMode && who === 'player' && card && card.canAttack && card.position === 'attack') {
      slot.classList.add('highlight');
      slot.onclick = () => selectAttacker(i);
    }

    if(card) {
      const cardEl = createCardElement(card, who === 'player');
      if(card.position === 'defense') cardEl.classList.add('defense-pos');
      if(!card.faceUp) cardEl.classList.add('facedown');
      if(G.selectedCard && G.selectedCard.uid === card.uid) cardEl.classList.add('selected');
      if(card.equipped) {
        const eq = document.createElement('div');
        eq.className = 'equip-indicator';
        eq.textContent = '+';
        cardEl.appendChild(eq);
      }
      // Position indicator
      const posInd = document.createElement('div');
      posInd.className = 'pos-indicator ' + (card.position === 'attack' ? 'atk' : 'def');
      posInd.textContent = card.position === 'attack' ? 'ATK' : 'DEF';
      cardEl.appendChild(posInd);
      slot.appendChild(cardEl);
    }

    zone.appendChild(slot);
  });

  // Add direct attack button if in battle mode and no enemy monsters
  if(G.battleMode && who === 'enemy' && G.selectedCard) {
    const hasEnemy = G.enemyMonsters.some(m => m !== null);
    if(!hasEnemy) {
      const btn = document.createElement('div');
      btn.className = 'card-slot highlight';
      btn.style.cursor = 'pointer';
      btn.innerHTML = '<span style="font-size:8px;color:var(--neon-blue);">直接<br>攻击</span>';
      btn.onclick = () => directAttack();
      zone.appendChild(btn);
    }
  }
}

function renderSpellZone(who) {
  const zoneId = who + '-spell-zone';
  const zone = document.getElementById(zoneId);
  const spells = who === 'player' ? G.playerSpells : G.enemySpells;
  zone.innerHTML = '';

  spells.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    if(card) {
      const cardEl = createCardElement(card, who === 'player');
      if(!card.faceUp) cardEl.classList.add('facedown');
      slot.appendChild(cardEl);
    }
    zone.appendChild(slot);
  });
}

function renderHand() {
  const hand = document.getElementById('hand');
  hand.innerHTML = '';

  G.playerHand.forEach(card => {
    const cardEl = createCardElement(card, true);
    cardEl.onclick = () => playCardFromHand(card.uid);
    hand.appendChild(cardEl);
  });
}

function renderPhase() {
  const phaseText = document.getElementById('phase-text');
  const phases = {
    'draw': '抽卡阶段',
    'main1': '主要阶段1',
    'battle': '战斗阶段',
    'main2': '主要阶段2',
    'enemy': '对手回合',
    'enemy-draw': '对手抽卡',
    'enemy-main': '对手主要阶段',
    'enemy-battle': '对手战斗阶段',
    'start': '准备中'
  };
  phaseText.textContent = phases[G.phase] || G.phase;
}

function renderButtons() {
  const battleBtn = document.getElementById('btn-battle');
  const endBtn = document.getElementById('btn-end');

  if(G.turn === 'player' && G.phase === 'main1' && !G.gameOver) {
    battleBtn.disabled = false;
    endBtn.disabled = false;
  } else if(G.turn === 'player' && G.phase === 'battle' && !G.gameOver) {
    battleBtn.disabled = true;
    endBtn.disabled = false;
  } else {
    battleBtn.disabled = true;
    endBtn.disabled = G.turn !== 'player' || G.gameOver;
  }
}

function createCardElement(card, showFace) {
  const el = document.createElement('div');
  el.className = 'card ' + card.type + '-card';

  if(!showFace && !card.faceUp) {
    el.classList.add('facedown');
    return el;
  }

  const inner = document.createElement('div');
  inner.className = 'card-inner';

  // Name
  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = card.name;
  inner.appendChild(name);

  // Level stars (monsters only)
  if(card.type === 'monster' && card.level) {
    const levelDiv = document.createElement('div');
    levelDiv.className = 'card-level';
    for(let i=0;i<Math.min(card.level,12);i++) {
      const star = document.createElement('span');
      star.className = 'star';
      star.textContent = '\u2605';
      levelDiv.appendChild(star);
    }
    inner.appendChild(levelDiv);
  }

  // Art
  const art = document.createElement('div');
  art.className = 'card-art';
  if(card.image) {
    const img = document.createElement('img');
    img.src = card.image;
    img.alt = card.name;
    img.loading = 'lazy';
    art.appendChild(img);
  } else if(card.type === 'spell') {
    const icon = document.createElement('div');
    icon.className = 'spell-icon';
    icon.textContent = '\u2726';
    icon.style.fontSize = '28px';
    icon.style.color = '#32CD32';
    icon.style.textShadow = '0 0 10px #32CD32';
    art.appendChild(icon);
  } else if(card.type === 'trap') {
    const icon = document.createElement('div');
    icon.className = 'trap-icon';
    icon.textContent = '\u2726';
    icon.style.fontSize = '28px';
    icon.style.color = '#DA70D6';
    icon.style.textShadow = '0 0 10px #DA70D6';
    art.appendChild(icon);
  }
  inner.appendChild(art);

  // Type
  if(card.type === 'monster') {
    const typeEl = document.createElement('div');
    typeEl.className = 'card-type';
    typeEl.textContent = card.race || '';
    inner.appendChild(typeEl);
  }

  // Stats
  if(card.type === 'monster') {
    const stats = document.createElement('div');
    stats.className = 'card-stats';
    stats.innerHTML = '<span class="atk">' + (card.currentAtk || card.atk) + '</span><span class="def">' + (card.currentDef || card.def) + '</span>';
    inner.appendChild(stats);
  }

  // Description for spells/traps
  if(card.type !== 'monster') {
    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = card.desc || '';
    inner.appendChild(desc);
  }

  el.appendChild(inner);

  // Tooltip events
  el.onmouseenter = (e) => showTooltip(e, card);
  el.onmouseleave = hideTooltip;
  el.ontouchstart = (e) => {
    // Don't show tooltip on touch, just handle click
  };

  return el;
}

function showTooltip(e, card) {
  const tt = document.getElementById('tooltip');
  let html = '<div class="tt-name">' + card.name + '</div>';
  if(card.type === 'monster') {
    html += '<div class="tt-type">' + (card.race||'') + ' ' + (card.attribute||'') + ' Lv' + card.level + '</div>';
    html += '<div class="tt-stats"><span class="atk">ATK ' + (card.currentAtk||card.atk) + '</span> / <span class="def">DEF ' + (card.currentDef||card.def) + '</span></div>';
  } else {
    html += '<div class="tt-type">' + (card.type === 'spell' ? '魔法卡' : '陷阱卡') + '</div>';
  }
  html += '<div class="tt-desc">' + (card.desc||'') + '</div>';
  tt.innerHTML = html;
  tt.style.display = 'block';

  const rect = e.target.closest('.card').getBoundingClientRect();
  let left = rect.right + 5;
  let top = rect.top;
  if(left + 170 > window.innerWidth) left = rect.left - 170;
  if(top + 150 > window.innerHeight) top = window.innerHeight - 160;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ==================== INIT ====================
window.addEventListener('load', () => {
  document.getElementById('overlay-title').textContent = '赛博纪元';
  document.getElementById('overlay').classList.add('show');
  initGameState();
  render();
});

// Prevent context menu on mobile
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
