<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>像素卡牌对战</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #1a1a2e;
    --bg-panel: #16213e;
    --bg-card: #0f3460;
    --accent: #e94560;
    --gold: #f5c842;
    --hp-green: #4ecca3;
    --mp-blue: #3282b8;
    --text: #eee;
    --pixel-border: 3px solid #e94560;
  }

  body {
    font-family: 'Press Start 2P', monospace;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    image-rendering: pixelated;
  }

  /* ===== 像素风通用样式 ===== */
  .pixel-border {
    border: var(--pixel-border);
    box-shadow: 
      inset 2px 2px 0 rgba(255,255,255,0.2),
      inset -2px -2px 0 rgba(0,0,0,0.3),
      4px 4px 0 rgba(0,0,0,0.5);
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 16px;
    border: 3px solid #fff;
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
    position: relative;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.5); }
  .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-accent { background: var(--accent); border-color: #ff6b81; }
  .btn-gold { background: #b8860b; border-color: var(--gold); color: #fff; }

  /* ===== 开始界面 ===== */
  #screen-start {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }
  .game-title {
    font-size: 24px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #b8860b, 0 0 20px rgba(245,200,66,0.3);
    margin-bottom: 10px;
    animation: titlePulse 2s ease-in-out infinite;
  }
  .game-subtitle {
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 40px;
  }
  @keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .pixel-sword {
    font-size: 64px;
    margin-bottom: 30px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* ===== 选卡界面 ===== */
  #screen-select {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }
  .screen-title {
    font-size: 16px;
    color: var(--gold);
    margin: 20px 0;
    text-shadow: 2px 2px 0 #b8860b;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    max-width: 600px;
    width: 100%;
    margin: 20px 0;
  }

  /* ===== 卡牌样式 ===== */
  .card {
    background: var(--bg-panel);
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
  }
  .card:hover { transform: translateY(-5px); }
  .card.selected { border-color: var(--gold); box-shadow: 0 0 15px rgba(245,200,66,0.5), 4px 4px 0 rgba(0,0,0,0.5); }
  .card-icon {
    font-size: 40px;
    margin: 8px 0;
    display: block;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .card-name {
    font-size: 9px;
    color: var(--gold);
    margin: 5px 0;
  }
  .card-stars {
    color: var(--gold);
    font-size: 8px;
    margin: 3px 0;
  }
  .card-stats {
    font-size: 7px;
    color: #aaa;
    line-height: 1.8;
  }
  .card-element {
    display: inline-block;
    font-size: 7px;
    padding: 2px 6px;
    border-radius: 2px;
    margin-top: 5px;
  }
  .element-fire { background: #e74c3c; }
  .element-ice { background: #3498db; }
  .element-wind { background: #2ecc71; }
  .element-dark { background: #9b59b6; }
  .element-holy { background: #f1c40f; color: #333; }

  /* ===== 战斗界面 ===== */
  #screen-battle {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 10px;
  }

  .battle-header {
    text-align: center;
    font-size: 10px;
    color: var(--accent);
    padding: 8px;
    background: rgba(233,69,96,0.1);
    margin-bottom: 10px;
  }

  .battle-field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .fighter-panel {
    flex: 1;
    min-width: 140px;
    max-width: 200px;
    padding: 12px;
    background: var(--bg-panel);
    text-align: center;
  }
  .fighter-panel.enemy { border-color: var(--accent); }
  .fighter-panel.player { border-color: var(--hp-green); }

  .fighter-icon {
    font-size: 48px;
    margin: 5px 0;
    display: block;
    transition: transform 0.3s;
  }
  .fighter-icon.attacking {
    animation: attackAnim 0.5s ease-out;
  }
  .fighter-icon.hurt {
    animation: hurtAnim 0.4s ease-out;
  }
  @keyframes attackAnim {
    0% { transform: translateX(0); }
    30% { transform: translateX(30px) scale(1.2); }
    100% { transform: translateX(0) scale(1); }
  }
  @keyframes hurtAnim {
    0%, 100% { filter: brightness(1); }
    25% { filter: brightness(3) hue-rotate(180deg); }
    50% { filter: brightness(0.5); transform: translateX(-5px); }
    75% { filter: brightness(2); transform: translateX(5px); }
  }

  .fighter-name {
    font-size: 9px;
    color: var(--gold);
    margin: 5px 0;
  }
  .fighter-level {
    font-size: 7px;
    color: #888;
  }

  .bar-container {
    margin: 6px 0;
    text-align: left;
  }
  .bar-label {
    font-size: 7px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .bar {
    height: 10px;
    background: #333;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    transition: width 0.5s ease;
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: rgba(255,255,255,0.2);
  }
  .hp-fill { background: var(--hp-green); }
  .mp-fill { background: var(--mp-blue); }

  .vs-text {
    font-size: 20px;
    color: var(--accent);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.8);
    font-weight: bold;
  }

  /* ===== 战斗日志 ===== */
  .battle-log {
    background: var(--bg-panel);
    padding: 10px;
    height: 100px;
    overflow-y: auto;
    font-size: 8px;
    line-height: 2;
    margin-bottom: 10px;
    border: 2px solid #333;
  }
  .battle-log::-webkit-scrollbar { width: 6px; }
  .battle-log::-webkit-scrollbar-thumb { background: var(--accent); }
  .log-player { color: var(--hp-green); }
  .log-enemy { color: var(--accent); }
  .log-system { color: var(--gold); }
  .log-critical { color: #ff6b6b; font-weight: bold; }

  /* ===== 技能面板 ===== */
  .skill-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .skill-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 10px 8px;
    border: 2px solid #555;
    background: var(--bg-panel);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    position: relative;
  }
  .skill-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(245,200,66,0.1); }
  .skill-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .skill-name { color: var(--gold); display: block; margin-bottom: 4px; }
  .skill-desc { color: #888; font-size: 7px; display: block; }
  .skill-cost { color: var(--mp-blue); font-size: 7px; position: absolute; bottom: 4px; right: 8px; }

  .action-panel {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ===== 战斗动画覆盖层 ===== */
  .damage-popup {
    position: fixed;
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: var(--accent);
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    z-index: 100;
    animation: damageFloat 1s ease-out forwards;
  }
  .damage-popup.heal { color: var(--hp-green); }
  .damage-popup.critical { font-size: 28px; color: #ff0; }
  @keyframes damageFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-30px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
  }

  /* ===== 结果界面 ===== */
  #screen-result {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }
  .result-icon { font-size: 72px; margin-bottom: 20px; }
  .result-title { font-size: 20px; margin-bottom: 10px; }
  .result-title.win { color: var(--gold); text-shadow: 2px 2px 0 #b8860b; }
  .result-title.lose { color: var(--accent); text-shadow: 2px 2px 0 #800; }
  .result-stats {
    font-size: 9px;
    line-height: 2.5;
    color: #aaa;
    margin: 20px 0;
  }

  /* ===== 闪光效果 ===== */
  .screen-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 99;
    animation: flash 0.3s ease-out;
  }
  .flash-white { background: rgba(255,255,255,0.6); }
  .flash-red { background: rgba(255,0,0,0.3); }
  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 400px) {
    .game-title { font-size: 18px; }
    .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .skill-panel { grid-template-columns: 1fr; }
    .fighter-icon { font-size: 36px; }
    .battle-field { flex-direction: row; }
  }
</style>
</head>
<body>

<!-- ===== 开始界面 ===== -->
<div id="screen-start">
  <div class="pixel-sword">⚔️</div>
  <div class="game-title">像素卡牌对战</div>
  <div class="game-subtitle">- PIXEL CARD BATTLE -</div>
  <button class="btn btn-accent" onclick="showScreen('select')" style="font-size:14px; padding:15px 30px;">
    ▶ 开始游戏
  </button>
  <p style="font-size:7px; color:#666; margin-top:30px;">选择3张卡牌组建你的队伍</p>
</div>

<!-- ===== 选卡界面 ===== -->

    <button class="btn" onclick="showScreen('start')">← 返回</button>
    <button class="btn btn-gold" id="btn-confirm" onclick="startBattle()" disabled>✦ 出战！</button>
  </div>
</div>

<!-- ===== 战斗界面 ===== -->
<div id="screen-battle">

  <div class="battle-log" id="battle-log"></div>
  <div class="skill-panel" id="skill-panel"></div>
  <div class="action-panel" id="action-panel"></div>
</div>

<!-- ===== 结果界面 ===== -->
<div id="screen-result">
  <div class="result-icon" id="result-icon"></div>
  <div class="result-title" id="result-title"></div>
  <div class="result-stats" id="result-stats"></div>

</div>

// ===== 游戏状态 =====
let selectedCards = [];
let player = null;
let enemy = null;
let battleState = {
  round: 1,
  playerBuffs: [],
  enemyBuffs: [],
  playerDebuffs: [],
  enemyDebuffs: [],
  playerDot: [],
  enemyDot: [],
  isPlayerTurn: true,
  isAnimating: false,
  totalDamageDealt: 0,
  totalDamageReceived: 0,
  totalHealed: 0,
  criticalHits: 0,
  turnsPlayed: 0
};

// ===== 界面控制 =====
function showScreen(name) {
  document.querySelectorAll('[id^="screen-"]').forEach(s => s.style.display = 'none');
  document.getElementById('screen-' + name).style.display = 'flex';
  if (name === 'select') renderCardGrid();
}

// ===== 选卡界面 =====
function renderCardGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  selectedCards = [];
  updateSelectCount();

  ALL_CARDS.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card pixel-border';
    div.dataset.id = card.id;
    div.innerHTML = `
      <span class="card-icon">${card.icon}</span>
      <div class="card-name">${card.name}</div>
      <div class="card-stars">${'★'.repeat(card.stars)}${'☆'.repeat(5 - card.stars)}</div>
      <div class="card-stats">
        HP ${card.baseHp} | ATK ${card.baseAtk}<br>
        DEF ${card.baseDef} | SPD ${card.baseSpd}
      </div>
      <span class="card-element element-${card.element}">${card.elementName}</span>
    `;
    div.onclick = () => toggleCard(card.id, div);
    grid.appendChild(div);
  });
}

function toggleCard(id, el) {
  const idx = selectedCards.indexOf(id);
  if (idx >= 0) {
    selectedCards.splice(idx, 1);
    el.classList.remove('selected');
  } else if (selectedCards.length < 3) {
    selectedCards.push(id);
    el.classList.add('selected');
  }
  updateSelectCount();
}

function updateSelectCount() {
  document.getElementById('select-count').textContent = selectedCards.length;
  document.getElementById('btn-confirm').disabled = selectedCards.length !== 3;
}

// ===== 战斗初始化 =====
function startBattle() {
  if (selectedCards.length !== 3) return;

  // 随机选择一张玩家卡牌作为出战角色
  const playerCardData = ALL_CARDS.find(c => c.id === selectedCards[Math.floor(Math.random() * selectedCards.length)]);
  // 随机选择敌人
  const enemyData = ENEMIES[Math.floor(Math.random() * ENEMIES.length)];

  player = createFighter(playerCardData, true);
  enemy = createFighter(enemyData, false);

  battleState = {
    round: 1, playerBuffs: [], enemyBuffs: [],
    playerDebuffs: [], enemyDebuffs: [],
    playerDot: [], enemyDot: [],
    isPlayerTurn: player.spd >= enemy.spd,
    isAnimating: false,
    totalDamageDealt: 0, totalDamageReceived: 0,
    totalHealed: 0, criticalHits: 0, turnsPlayed: 0
  };

  showScreen('battle');
  renderBattle();
  addLog(`⚔️ 战斗开始！${player.name} VS ${enemy.name}`, 'system');
  addLog(`📊 ${player.name} 先手出击！`, 'system');

  if (!battleState.isPlayerTurn) {
    setTimeout(() => enemyTurn(), 1000);
  }
}

function createFighter(data, isPlayer) {
  return {
    ...data,
    hp: data.baseHp || data.hp,
    maxHp: data.baseHp || data.hp,
    mp: data.baseMp || data.mp,
    maxMp: data.baseMp || data.mp,
    atk: data.baseAtk || data.atk,
    def: data.baseDef || data.def,
    spd: data.baseSpd || data.spd,
    isPlayer
  };
}

// ===== 战斗渲染 =====
function renderBattle() {
  // 头部
  document.getElementById('battle-header').textContent = `⚔️ 第 ${battleState.round} 回合`;

  // 玩家面板
  document.getElementById('player-panel').innerHTML = `
    <div class="fighter-name">${player.name}</div>
    <div class="fighter-level">★${player.stars} ${player.elementName}属性</div>
    <span class="fighter-icon" id="player-icon">${player.icon}</span>
    <div class="bar-container">
      <div class="bar-label"><span>HP</span><span>${player.hp}/${player.maxHp}</span></div>
      <div class="bar"><div class="bar-fill hp-fill" style="width:${player.hp/player.maxHp*100}%"></div></div>
    </div>
    <div class="bar-container">
      <div class="bar-label"><span>MP</span><span>${player.mp}/${player.maxMp}</span></div>
      <div class="bar"><div class="bar-fill mp-fill" style="width:${player.mp/player.maxMp*100}%"></div></div>
    </div>
    <div style="font-size:7px;color:#888;margin-top:4px;">ATK ${player.atk} | DEF ${player.def}</div>
    ${renderBuffs('player')}
  `;

  // 敌人面板
  document.getElementById('enemy-panel').innerHTML = `
    <div class="fighter-name">${enemy.name}</div>
    <div class="fighter-level">★${enemy.stars} ${enemy.elementName}属性</div>
    <span class="fighter-icon" id="enemy-icon">${enemy.icon}</span>
    <div class="bar-container">
      <div class="bar-label"><span>HP</span><span>${enemy.hp}/${enemy.maxHp}</span></div>
      <div class="bar"><div class="bar-fill hp-fill" style="width:${enemy.hp/enemy.maxHp*100}%"></div></div>
    </div>
    <div class="bar-container">
      <div class="bar-label"><span>MP</span><span>${enemy.mp}/${enemy.maxMp}</span></div>
      <div class="bar"><div class="bar-fill mp-fill" style="width:${enemy.mp/enemy.maxMp*100}%"></div></div>
    </div>
    <div style="font-size:7px;color:#888;margin-top:4px;">ATK ${enemy.atk} | DEF ${enemy.def}</div>
    ${renderBuffs('enemy')}
  `;

  // 技能面板
  renderSkills();
}

function renderBuffs(who) {
  const buffs = who === 'player' ? battleState.playerBuffs : battleState.enemyBuffs;
  const debuffs = who === 'player' ? battleState.playerDebuffs : battleState.enemyDebuffs;
  let html = '';
  buffs.forEach(b => { html += `<span style="font-size:6px;color:#4ecca3;">[${b.type}↑ ${b.remaining}回合]</span> `; });
  debuffs.forEach(d => { html += `<span style="font-size:6px;color:#e94560;">[${d.type}↓ ${d.remaining}回合]</span> `; });
  return html ? `<div style="margin-top:4px;">${html}</div>` : '';
}

function renderSkills() {
  const panel = document.getElementById('skill-panel');
  const actionPanel = document.getElementById('action-panel');
  panel.innerHTML = '';
  actionPanel.innerHTML = '';

  if (!battleState.isPlayerTurn || battleState.isAnimating) {
    panel.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#888;font-size:9px;padding:15px;">等待对方行动...</div>';
    return;
  }

  player.skills.forEach((skill, i) => {
    const canUse = player.mp >= skill.cost;
    const btn = document.createElement('button');
    btn.className = 'skill-btn pixel-border';
    btn.disabled = !canUse;
    btn.innerHTML = `
      <span class="skill-name">${skill.name}</span>
      <span class="skill-desc">${skill.desc}</span>
      ${skill.cost > 0 ? `<span class="skill-cost">MP ${skill.cost}</span>` : '<span class="skill-cost" style="color:#4ecca3;">免费</span>'}
    `;
    btn.onclick = () => playerUseSkill(i);
    panel.appendChild(btn);
  });
}

// ===== 战斗日志 =====
function addLog(text, type = '') {
  const log = document.getElementById('battle-log');
  const line = document.createElement('div');
  line.className = `log-${type}`;
  line.textContent = text;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ===== 伤害计算 =====
function calcDamage(attacker, defender, skill) {
  const basePower = skill.power || 1.0;
  let atk = attacker.atk;
  let def = defender.def;

  // 属性加成
  const advantage = { fire: 'wind', wind: 'ice', ice: 'fire', holy: 'dark', dark: 'holy' };
  let elementMultiplier = 1.0;
  if (skill.element && advantage[skill.element] === defender.element) {
    elementMultiplier = 1.3;
  } else if (skill.element && advantage[defender.element] === skill.element) {
    elementMultiplier = 0.7;
  }

  // 暴击
  let isCrit = Math.random() < (skill.critRate || 0.1);
  let critMultiplier = isCrit ? 1.8 : 1.0;

  // 随机浮动
  let variance = 0.9 + Math.random() * 0.2;

  let damage = Math.floor((atk * basePower - def * 0.5) * elementMultiplier * critMultiplier * variance);
  damage = Math.max(1, damage);

  return { damage, isCrit, elementMultiplier };
}

// ===== 玩家行动 =====
function playerUseSkill(skillIndex) {
  if (battleState.isAnimating || !battleState.isPlayerTurn) return;
  battleState.isAnimating = true;
  battleState.turnsPlayed++;

  const skill = player.skills[skillIndex];
  if (player.mp < skill.cost) return;

  player.mp -= skill.cost;

  // 攻击动画
  const playerIcon = document.getElementById('player-icon');
  if (playerIcon) { playerIcon.classList.add('attacking'); setTimeout(() => playerIcon.classList.remove('attacking'), 500); }

  setTimeout(() => {
    executeSkill(player, enemy, skill, 'player');
    renderBattle();

    if (checkBattleEnd()) return;

    // 处理回合结束效果
    processTurnEnd('player');

    setTimeout(() => {
      battleState.isPlayerTurn = false;
      renderBattle();
      setTimeout(() => enemyTurn(), 800);
    }, 600);
  }, 400);
}

// ===== 敌人行动 =====
function enemyTurn() {
  if (battleState.isAnimating) return;
  battleState.isAnimating = true;
  battleState.turnsPlayed++;

  // AI 选择技能
  const availableSkills = enemy.skills.filter(s => enemy.mp >= s.cost);
  let skill;
  if (enemy.hp < enemy.maxHp * 0.3 && availableSkills.find(s => s.type === 'restore')) {
    skill = availableSkills.find(s => s.type === 'restore');
  } else {
    const attackSkills = availableSkills.filter(s => s.type === 'attack');
    skill = attackSkills.length > 0 ? attackSkills[Math.floor(Math.random() * attackSkills.length)] : enemy.skills[enemy.skills.length - 1];
  }

  enemy.mp -= skill.cost;

  const enemyIcon = document.getElementById('enemy-icon');
  if (enemyIcon) { enemyIcon.classList.add('attacking'); setTimeout(() => enemyIcon.classList.remove('attacking'), 500); }

  setTimeout(() => {
    executeSkill(enemy, player, skill, 'enemy');
    renderBattle();

    if (checkBattleEnd()) return;

    processTurnEnd('enemy');

    setTimeout(() => {
      battleState.round++;
      battleState.isPlayerTurn = true;
      battleState.isAnimating = false;

      // 回合开始恢复MP
      player.mp = Math.min(player.maxMp, player.mp + 3);
      enemy.mp = Math.min(enemy.maxMp, enemy.mp + 3);

      renderBattle();
      addLog(`--- 第 ${battleState.round} 回合 ---`, 'system');
    }, 600);
  }, 400);
}

// ===== 技能执行 =====
function executeSkill(attacker, defender, skill, who) {
  const isPlayer = who === 'player';
  const logType = isPlayer ? 'player' : 'enemy';

  switch (skill.type) {
    case 'attack': {
      const result = calcDamage(attacker, defender, skill);
      defender.hp = Math.max(0, defender.hp - result.damage);

      // 吸血效果
      if (skill.drain) {
        const healAmount = Math.floor(result.damage * skill.drain);
        attacker.hp = Math.min(attacker.maxHp, attacker.hp + healAmount);
        addLog(`${attacker.name} 吸取了 ${healAmount} HP！`, logType);
      }

      // 附加debuff
      if (skill.debuffType) {
        const debuffs = isPlayer ? battleState.enemyDebuffs : battleState.playerDebuffs;
        debuffs.push({ type: skill.debuffType, value: skill.debuffValue, remaining: skill.duration });
        addLog(`${defender.name} 被施加了 ${skill.debuffType} 降低效果！`, logType);
      }

      // 附加DOT
      if (skill.dotType) {
        const dots = isPlayer ? battleState.enemyDot : battleState.playerDot;
        dots.push({ type: skill.dotType, value: skill.dotValue, remaining: skill.duration });
        addLog(`${defender.name} 中毒了！每回合损失 ${skill.dotValue} HP`, logType);
      }

      // 统计
      if (isPlayer) { battleState.totalDamageDealt += result.damage; if (result.isCrit) battleState.criticalHits++; }
      else { battleState.totalDamageReceived += result.damage; }

      // 日志
      let logText = `${attacker.name} 使用了【${skill.name}】造成 ${result.damage} 点伤害！`;
      if (result.isCrit) logText = `💥 暴击！${logText}`;
      if (result.elementMultiplier > 1) logText += ' (属性克制！)';
      else if (result.elementMultiplier < 1) logText += ' (属性抵抗)';
      addLog(logText, result.isCrit ? 'critical' : logType);

      // 伤害弹出
      showDamagePopup(defender, result.damage, result.isCrit);

      // 受击动画
      const defIcon = document.getElementById(isPlayer ? 'player-icon' : 'enemy-icon');
      if (defIcon) { defIcon.classList.add('hurt'); setTimeout(() => defIcon.classList.remove('hurt'), 400); }

      // 屏幕闪光
      showFlash(isPlayer ? 'flash-red' : 'flash-white');
      break;
    }
    case 'restore': {
      const stat = skill.restoreType;
      const value = skill.restoreValue;
      if (stat === 'hp') {
        const actual = Math.min(value, attacker.maxHp - attacker.hp);
        attacker.hp += actual;
        if (isPlayer) battleState.totalHealed += actual;
        addLog(`${attacker.name} 使用了【${skill.name}】恢复了 ${actual} HP！`, logType);
        showDamagePopup(attacker, actual, false, true);
      } else if (stat === 'mp') {
        const actual = Math.min(value, attacker.maxMp - attacker.mp);
        attacker.mp += actual;
        addLog(`${attacker.name} 使用了【${skill.name}】恢复了 ${actual} MP！`, logType);
      }
      showFlash('flash-white');
      break;
    }
    case 'buff': {
      const buffs = isPlayer ? battleState.playerBuffs : battleState.enemyBuffs;
      buffs.push({ type: skill.buffType, value: skill.buffValue, remaining: skill.duration });
      // 立即应用buff
      if (skill.buffType === 'atk') attacker.atk = Math.floor(attacker.atk * skill.buffValue);
      if (skill.buffType === 'def') attacker.def = Math.floor(attacker.def * skill.buffValue);
      if (skill.buffType === 'spd') attacker.spd = Math.floor(attacker.spd * skill.buffValue);
      addLog(`${attacker.name} 使用了【${skill.name}】${skill.buffType} 提升了！`, logType);
      showFlash('flash-white');
      break;
    }
    case 'debuff': {
      const debuffs = isPlayer ? battleState.enemyDebuffs : battleState.playerDebuffs;
      debuffs.push({ type: skill.debuffType, value: skill.debuffValue, remaining: skill.duration });
      if (skill.debuffType === 'atk') defender.atk = Math.floor(defender.atk * skill.debuffValue);
      if (skill.debuffType === 'def') defender.def = Math.floor(defender.def * skill.debuffValue);
      addLog(`${attacker.name} 使用了【${skill.name}】降低了 ${defender.name} 的 ${skill.debuffType}！`, logType);
      break;
    }
    case 'special': {
      if (skill.specialType === 'berserk') {
        const hpCost = Math.floor(attacker.maxHp * 0.15);
        attacker.hp -= hpCost;
        attacker.atk = Math.floor(attacker.atk * 1.8);
        addLog(`${attacker.name} 使用了【${skill.name}】牺牲 ${hpCost} HP，攻击力大幅提升！`, logType);
        showDamagePopup(attacker, hpCost, false);
      }
      break;
    }
  }
}

// ===== 回合结束处理 =====
function processTurnEnd(who) {
  const isPlayer = who === 'player';

  // 处理DOT
  const dots = isPlayer ? battleState.enemyDot : battleState.playerDot;
  const target = isPlayer ? enemy : player;
  for (let i = dots.length - 1; i >= 0; i--) {
    target.hp = Math.max(0, target.hp - dots[i].value);
    addLog(`☠️ ${target.name} 受到 ${dots[i].type} 效果，损失 ${dots[i].value} HP！`, isPlayer ? 'player' : 'enemy');
    dots[i].remaining--;
    if (dots[i].remaining <= 0) dots.splice(i, 1);
  }

  // 处理buff持续时间
  const buffs = isPlayer ? battleState.playerBuffs : battleState.enemyBuffs;
  for (let i = buffs.length - 1; i >= 0; i--) {
    buffs[i].remaining--;
    if (buffs[i].remaining <= 0) {
      // 移除buff效果
      const fighter = isPlayer ? player : enemy;
      if (buffs[i].type === 'atk') fighter.atk = Math.floor(fighter.atk / buffs[i].value);
      if (buffs[i].type === 'def') fighter.def = Math.floor(fighter.def / buffs[i].value);
      if (buffs[i].type === 'spd') fighter.spd = Math.floor(fighter.spd / buffs[i].value);
      addLog(`${fighter.name} 的 ${buffs[i].type} 提升效果消失了`, 'system');
      buffs.splice(i, 1);
    }
  }

  // 处理debuff持续时间
  const debuffs = isPlayer ? battleState.enemyDebuffs : battleState.playerDebuffs;
  for (let i = debuffs.length - 1; i >= 0; i--) {
    debuffs[i].remaining--;
    if (debuffs[i].remaining <= 0) {
      const fighter = isPlayer ? enemy : player;
      if (debuffs[i].type === 'atk') fighter.atk = Math.floor(fighter.atk / debuffs[i].value);
      if (debuffs[i].type === 'def') fighter.def = Math.floor(fighter.def / debuffs[i].value);
      addLog(`${fighter.name} 的 ${debuffs[i].type} 降低效果消失了`, 'system');
      debuffs.splice(i, 1);
    }
  }
}

// ===== 战斗结束检查 =====
function checkBattleEnd() {
  if (enemy.hp <= 0) {
    setTimeout(() => showResult(true), 800);
    return true;
  }
  if (player.hp <= 0) {
    setTimeout(() => showResult(false), 800);
    return true;
  }
  battleState.isAnimating = false;
  return false;
}

// ===== 结果界面 =====
function showResult(isWin) {
  showScreen('result');
  document.getElementById('result-icon').textContent = isWin ? '🏆' : '💀';
  document.getElementById('result-title').textContent = isWin ? '胜 利 ！' : '败 北 ...';
  document.getElementById('result-title').className = `result-title ${isWin ? 'win' : 'lose'}`;
  document.getElementById('result-stats').innerHTML = `
    对手：${enemy.name}<br>
    总回合数：${battleState.round}<br>
    造成伤害：${battleState.totalDamageDealt}<br>
    承受伤害：${battleState.totalDamageReceived}<br>
    总治愈量：${battleState.totalHealed}<br>
    暴击次数：${battleState.criticalHits}<br>
    剩余HP：${Math.max(0, player.hp)} / ${player.maxHp}
  `;
}

// ===== 特效 =====
function showDamagePopup(target, value, isCrit, isHeal) {
  const popup = document.createElement('div');
  popup.className = `damage-popup ${isHeal ? 'heal' : ''} ${isCrit ? 'critical' : ''}`;
  popup.textContent = isHeal ? `+${value}` : `-${value}`;
  popup.style.left = '50%';
  popup.style.top = '40%';
  popup.style.transform = 'translateX(-50%)';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);
}

function showFlash(className) {
  const flash = document.createElement('div');
  flash.className = `screen-flash ${className}`;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 300);
}

// ===== 初始化 =====
showScreen('start');
</script>
